<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Liga - La Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --white: #f5f5f5;
            --error: #ff4444;
            --success: #00c851;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #login-overlay h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 2rem;
        }

        #login-overlay input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--gold);
            background: var(--dark-gray);
            color: white;
            font-size: 1.2rem;
            text-align: center;
        }

        /* Main Dashboard */
        header {
            padding: 1rem 2rem;
            background: var(--dark-gray);
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
        }

        .container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background: var(--dark-gray);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: var(--gold);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        input[type="number"], input[type="text"] {
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            border-radius: 3px;
            width: 60px;
        }

        input[type="text"].wide {
            width: 120px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-gold { background: var(--gold); color: black; }
        .btn-red { background: var(--error); color: white; }
        .btn-blue { background: #33b5e5; color: white; }

        .btn:hover { opacity: 0.8; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        select, input[type="number"], input[type="text"] {
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        .hidden { display: none !important; }

        .status-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            z-index: 2000;
        }
        .status-success { background: var(--success); color: white; }
        .status-error { background: var(--error); color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1>PANEL ADMIN LIGA</h1>
    <input type="password" id="admin-pass" placeholder="Contraseña..." onkeypress="if(event.key === 'Enter') checkPass()">
    <p style="color: #666; margin-top: 1rem; font-size: 0.8rem;">Pulsa Enter para entrar</p>
</div>

<div id="admin-dashboard" class="hidden">
    <header>
        <h1>CATRINA LIGA ADMIN</h1>
        <button class="btn btn-red" onclick="logout()">Cerrar Sesión</button>
    </header>

    <div class="container">

        <!-- SECCIÓN: NUEVO PARTIDO -->
        <div class="section">
            <h2>Registrar Nuevo Partido</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Equipo Ganador</label>
                    <select id="new-winner-team" onchange="updatePlayerDropdown('winner')">
                        <option value="1">1. BAH!</option>
                        <option value="2">2. JAMPOOLEROS TEAM</option>
                        <option value="3">3. LOS INTERNACIONALES</option>
                        <option value="4">4. ITCHY ARMPITS</option>
                        <option value="5">5. MACHACADORAS CON ACTITUD</option>
                        <option value="6">6. MICROPLÁSTICOS EN LOS COJONES S.L.</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jugador Ganador</label>
                    <select id="new-winner-id"></select>
                </div>
                <div class="form-group">
                    <label>Equipo Perdedor</label>
                    <select id="new-loser-team" onchange="updatePlayerDropdown('loser')">
                        <option value="1">1. BAH!</option>
                        <option value="2">2. JAMPOOLEROS TEAM</option>
                        <option value="3">3. LOS INTERNACIONALES</option>
                        <option value="4">4. ITCHY ARMPITS</option>
                        <option value="5">5. MACHACADORAS CON ACTITUD</option>
                        <option value="6">6. MICROPLÁSTICOS EN LOS COJONES S.L.</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jugador Perdedor</label>
                    <select id="new-loser-id"></select>
                </div>
                <div class="form-group">
                    <label>Frames Ganador</label>
                    <input type="number" id="new-winner-frames" value="3">
                </div>
                <div class="form-group">
                    <label>Frames Perdedor</label>
                    <input type="number" id="new-loser-frames" value="0">
                </div>
                <div class="form-group">
                    <label>Puntos Ganador</label>
                    <input type="number" id="new-winner-pts" value="3">
                </div>
                <div class="form-group">
                    <label>Puntos Perdedor</label>
                    <input type="number" id="new-loser-pts" value="0">
                </div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn btn-gold" onclick="createNewMatch()">Añadir Partido</button>
                <label style="font-size: 0.8rem; color: #aaa;">
                    <input type="checkbox" id="auto-update-stats" checked>
                    Actualizar estadísticas automáticamente
                </label>
            </div>
        </div>

        <!-- SECCIÓN: JUGADORES -->
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Estadísticas de Jugadores</h2>
                <button class="btn btn-blue" onclick="loadData()">Refrescar Datos</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="players-table">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th>PJ</th>
                            <th>PG</th>
                            <th>PP</th>
                            <th>JG</th>
                            <th>JP</th>
                            <th>Pts</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="players-body">
                        <!-- Cargando... -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN: PARTIDOS -->
        <div class="section">
            <h2>Historial de Partidos</h2>
            <div style="overflow-x: auto;">
                <table id="matches-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ganador</th>
                            <th>Perdedor</th>
                            <th>Resultado</th>
                            <th>Puntos G/P</th>
                            <th>Equipos</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="matches-body">
                        <!-- Cargando... -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div id="status-container"></div>

<script>
    const AUTH_TOKEN = 'INwsYYgPTSIzptBA3ttg3GMzQ0Y4aGYsGWmYiqpp';
    const BASE_URL = 'https://elopool-f1e62-default-rtdb.europe-west1.firebasedatabase.app/liga';
    const PASS = 'catrina2026';

    const teamNames = {
        1: 'BAH!',
        2: 'JAMPOOLEROS TEAM',
        3: 'LOS INTERNACIONALES',
        4: 'ITCHY ARMPITS',
        5: 'MACHACADORAS CON ACTITUD',
        6: 'MICROPLÁSTICOS EN LOS COJONES S.L.'
    };

    const teamMap = {
        1: ['johnny', 'andres', 'mo', 'david', 'ponci', 'danilo'],
        2: ['artur', 'sergio', 'alexf', 'jorge', 'alexb', 'sol'],
        3: ['amauris', 'sasa', 'angel', 'erfan', 'nino', 'damian'],
        4: ['jack', 'jonathan', 'connor', 'charles', 'lucas', 'favio'],
        5: ['fer', 'katee', 'enrique', 'mina', 'ruth', 'rauls'],
        6: ['pablo', 'joe', 'lucasc', 'joel', 'roman', 'manuela']
    };

    let playersData = {};
    let matchesData = {};

    function checkPass() {
        const input = document.getElementById('admin-pass').value;
        if (input === PASS) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            loadData();
            updatePlayerDropdown('winner');
            updatePlayerDropdown('loser');
        } else {
            alert('Contraseña incorrecta');
        }
    }

    function logout() {
        location.reload();
    }

    function showStatus(msg, type = 'success') {
        const container = document.getElementById('status-container');
        const div = document.createElement('div');
        div.className = `status-msg status-${type}`;
        div.innerText = msg;
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function updatePlayerDropdown(type) {
        const teamId = document.getElementById(`new-${type}-team`).value;
        const playerSelect = document.getElementById(`new-${type}-id`);
        const players = teamMap[teamId] || [];

        playerSelect.innerHTML = '';
        players.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            playerSelect.appendChild(opt);
        });
    }

    async function loadData() {
        try {
            const [playersRes, matchesRes] = await Promise.all([
                fetch(`${BASE_URL}/stats.json?auth=${AUTH_TOKEN}`),
                fetch(`${BASE_URL}/matches.json?auth=${AUTH_TOKEN}`)
            ]);

            playersData = await playersRes.json() || {};
            matchesData = await matchesRes.json() || {};

            renderPlayers();
            renderMatches();
        } catch (err) {
            console.error(err);
            showStatus('Error cargando datos', 'error');
        }
    }

    function renderPlayers() {
        const body = document.getElementById('players-body');
        body.innerHTML = '';

        // Combine all players from teamMap with playersData
        const allPlayers = {};

        // Initialize with 0s for all known players from teamMap
        Object.values(teamMap).flat().forEach(playerId => {
            allPlayers[playerId] = { played: 0, wins: 0, losses: 0, framesWon: 0, framesLost: 0, points: 0 };
        });

        // Merge with actual data from Firebase
        Object.entries(playersData).forEach(([id, stats]) => {
            allPlayers[id] = stats;
        });

        Object.entries(allPlayers).sort((a,b) => (b[1].points || 0) - (a[1].points || 0)).forEach(([id, stats]) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:bold; color:var(--gold)">${id}</td>
                <td><input type="number" id="p-${id}-played" value="${stats.played || 0}"></td>
                <td><input type="number" id="p-${id}-wins" value="${stats.wins || 0}"></td>
                <td><input type="number" id="p-${id}-losses" value="${stats.losses || 0}"></td>
                <td><input type="number" id="p-${id}-framesWon" value="${stats.framesWon || 0}"></td>
                <td><input type="number" id="p-${id}-framesLost" value="${stats.framesLost || 0}"></td>
                <td><input type="number" id="p-${id}-points" value="${stats.points || 0}" style="border-color:var(--gold)"></td>
                <td>
                    <button class="btn btn-gold" onclick="updatePlayer('${id}')">Guardar</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function renderMatches() {
        const body = document.getElementById('matches-body');
        body.innerHTML = '';

        const sortedMatches = Object.entries(matchesData).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

        sortedMatches.forEach(([id, match]) => {
            const date = match.timestamp ? new Date(match.timestamp * 1000).toLocaleDateString() : '---';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:0.7rem">${date}</td>
                <td><input type="text" id="m-${id}-winnerId" value="${match.winnerId}" class="wide"></td>
                <td><input type="text" id="m-${id}-loserId" value="${match.loserId}" class="wide"></td>
                <td>
                    <input type="number" id="m-${id}-winnerFrames" value="${match.winnerFrames}"> -
                    <input type="number" id="m-${id}-loserFrames" value="${match.loserFrames}">
                </td>
                <td>
                    <input type="number" id="m-${id}-winnerPointsAwarded" value="${match.winnerPointsAwarded}"> /
                    <input type="number" id="m-${id}-loserPointsAwarded" value="${match.loserPointsAwarded}">
                </td>
                <td>
                    <div style="font-size:0.7rem; color:var(--gold)">${teamNames[match.winnerTeam] || '---'}</div>
                    <input type="number" id="m-${id}-winnerTeam" value="${match.winnerTeam || 0}">
                    <hr style="border:0; border-top:1px solid #333; margin:2px 0">
                    <div style="font-size:0.7rem; color:var(--gold)">${teamNames[match.loserTeam] || '---'}</div>
                    <input type="number" id="m-${id}-loserTeam" value="${match.loserTeam || 0}">
                </td>
                <td style="white-space:nowrap">
                    <button class="btn btn-gold" onclick="updateMatch('${id}')">💾</button>
                    <button class="btn btn-red" onclick="deleteMatch('${id}')">🗑️</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    async function updatePlayer(id) {
        const data = {
            played: parseInt(document.getElementById(`p-${id}-played`).value),
            wins: parseInt(document.getElementById(`p-${id}-wins`).value),
            losses: parseInt(document.getElementById(`p-${id}-losses`).value),
            framesWon: parseInt(document.getElementById(`p-${id}-framesWon`).value),
            framesLost: parseInt(document.getElementById(`p-${id}-framesLost`).value),
            points: parseInt(document.getElementById(`p-${id}-points`).value)
        };

        try {
            const res = await fetch(`${BASE_URL}/stats/${id}.json?auth=${AUTH_TOKEN}`, {
                method: 'PATCH',
                body: JSON.stringify(data)
            });
            if (res.ok) {
                showStatus(`Jugador ${id} actualizado`);
                playersData[id] = data;
            }
        } catch (err) {
            showStatus('Error al actualizar jugador', 'error');
        }
    }

    async function updateMatch(id) {
        const data = {
            winnerId: document.getElementById(`m-${id}-winnerId`).value,
            loserId: document.getElementById(`m-${id}-loserId`).value,
            winnerFrames: parseInt(document.getElementById(`m-${id}-winnerFrames`).value),
            loserFrames: parseInt(document.getElementById(`m-${id}-loserFrames`).value),
            winnerPointsAwarded: parseInt(document.getElementById(`m-${id}-winnerPointsAwarded`).value),
            loserPointsAwarded: parseInt(document.getElementById(`m-${id}-loserPointsAwarded`).value),
            winnerTeam: parseInt(document.getElementById(`m-${id}-winnerTeam`).value),
            loserTeam: parseInt(document.getElementById(`m-${id}-loserTeam`).value)
        };

        try {
            const res = await fetch(`${BASE_URL}/matches/${id}.json?auth=${AUTH_TOKEN}`, {
                method: 'PATCH',
                body: JSON.stringify(data)
            });
            if (res.ok) {
                showStatus('Partido actualizado');
                matchesData[id] = { ...matchesData[id], ...data };
            }
        } catch (err) {
            showStatus('Error al actualizar partido', 'error');
        }
    }

    async function deleteMatch(id) {
        if (!confirm('¿Seguro que quieres borrar este partido? Se intentará revertir las estadísticas de los jugadores.')) return;

        try {
            const match = matchesData[id];
            if (match) {
                const wId = match.winnerId;
                const lId = match.loserId;
                const wF = parseInt(match.winnerFrames);
                const lF = parseInt(match.loserFrames);
                const wP = parseInt(match.winnerPointsAwarded);
                const lP = parseInt(match.loserPointsAwarded);

                const wStats = playersData[wId];
                const lStats = playersData[lId];

                if (wStats && lStats) {
                    wStats.played--;
                    wStats.wins--;
                    wStats.framesWon -= wF;
                    wStats.framesLost -= lF;
                    wStats.points -= wP;

                    lStats.played--;
                    lStats.losses--;
                    lStats.framesWon -= lF;
                    lStats.framesLost -= wF;
                    lStats.points -= lP;

                    await Promise.all([
                        fetch(`${BASE_URL}/stats/${wId}.json?auth=${AUTH_TOKEN}`, { method: 'PATCH', body: JSON.stringify(wStats) }),
                        fetch(`${BASE_URL}/stats/${lId}.json?auth=${AUTH_TOKEN}`, { method: 'PATCH', body: JSON.stringify(lStats) })
                    ]);
                }
            }

            const res = await fetch(`${BASE_URL}/matches/${id}.json?auth=${AUTH_TOKEN}`, {
                method: 'DELETE'
            });
            if (res.ok) {
                showStatus('Partido eliminado y estadísticas revertidas');
                delete matchesData[id];
                loadData();
            }
        } catch (err) {
            showStatus('Error al borrar partido', 'error');
        }
    }

    async function createNewMatch() {
        const wId = document.getElementById('new-winner-id').value.trim().toLowerCase();
        const lId = document.getElementById('new-loser-id').value.trim().toLowerCase();
        const wF = parseInt(document.getElementById('new-winner-frames').value);
        const lF = parseInt(document.getElementById('new-loser-frames').value);
        const wP = parseInt(document.getElementById('new-winner-pts').value);
        const lP = parseInt(document.getElementById('new-loser-pts').value);
        const wT = parseInt(document.getElementById('new-winner-team').value);
        const lT = parseInt(document.getElementById('new-loser-team').value);
        const auto = document.getElementById('auto-update-stats').checked;

        if (!wId || !lId) {
            alert('Faltan IDs de jugadores');
            return;
        }

        const matchId = `admin_${Date.now()}`;
        const matchData = {
            winnerId: wId,
            loserId: lId,
            winnerFrames: wF,
            loserFrames: lF,
            winnerPointsAwarded: wP,
            loserPointsAwarded: lP,
            winnerTeam: wT,
            loserTeam: lT,
            timestamp: Math.floor(Date.now() / 1000),
            source: 'admin'
        };

        try {
            // Guardar Partido
            await fetch(`${BASE_URL}/matches/${matchId}.json?auth=${AUTH_TOKEN}`, {
                method: 'PUT',
                body: JSON.stringify(matchData)
            });

            if (auto) {
                await updatePlayerStatsAfterMatch(wId, lId, wF, lF, wP, lP);
            }

            showStatus('Partido registrado con éxito');
            loadData();
        } catch (err) {
            showStatus('Error al crear partido', 'error');
        }
    }

    async function updatePlayerStatsAfterMatch(wId, lId, wF, lF, wP, lP) {
        // Obtener datos actuales o crear vacíos
        const wStats = playersData[wId] || { played: 0, wins: 0, losses: 0, framesWon: 0, framesLost: 0, points: 0 };
        const lStats = playersData[lId] || { played: 0, wins: 0, losses: 0, framesWon: 0, framesLost: 0, points: 0 };

        // Actualizar Ganador
        wStats.played++;
        wStats.wins++;
        wStats.framesWon += wF;
        wStats.framesLost += lF;
        wStats.points += wP;

        // Actualizar Perdedor
        lStats.played++;
        lStats.losses++;
        lStats.framesWon += lF;
        lStats.framesLost += wF;
        lStats.points += lP;

        await Promise.all([
            fetch(`${BASE_URL}/stats/${wId}.json?auth=${AUTH_TOKEN}`, { method: 'PATCH', body: JSON.stringify(wStats) }),
            fetch(`${BASE_URL}/stats/${lId}.json?auth=${AUTH_TOKEN}`, { method: 'PATCH', body: JSON.stringify(lStats) })
        ]);
    }

</script>
</body>
</html>
