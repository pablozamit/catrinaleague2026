<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Partidos - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/style.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 4px;
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .calendar-wrapper {
            background: rgba(255, 255, 255, 1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        iframe {
            width: 100%;
            height: 80vh;
            min-height: 600px;
            border: none;
            display: block;
        }

        .info-box {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 0 2rem;
        }

        .info-box p {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.6;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin: 1.5rem 2rem;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link::before {
            content: '← ';
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            iframe {
                height: 60vh;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">Volver al inicio</a>

    <div class="header">
        <h1>AGENDA DE PARTIDOS</h1>
        <p>Consulta y programa tus próximos encuentros</p>
    </div>

    <div class="calendar-container">
        <div class="calendar-wrapper">
            <iframe
                src="https://calendar.google.com/calendar/embed?src=26b2b14efdb88c0f380cab93f59b346739701deea26a01c7be0fa6d14b20a491%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=WEEK&hl=es&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=1"
                title="Calendario de Partidos"
                scrolling="no">
            </iframe>
        </div>
    </div>

    <div class="info-box">
        <p>
            Los horarios marcados en verde son partidas confirmadas. <br>
            <strong>Nota:</strong> Si tras agendar tu partido no ves el nuevo evento o los cambios reflejados, por favor refresca la página.
        </p>
    </div>

    <div class="chat-arrow">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 7L17 17M17 17V8M17 17H8" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <style>
        .chat-arrow {
            position: fixed;
            bottom: 100px;
            right: 40px;
            z-index: 999;
            animation: point-to-chat 1.2s infinite ease-in-out;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));
        }

        @keyframes point-to-chat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 20px) scale(1.3); }
        }

        @media (max-width: 768px) {
            .chat-arrow {
                bottom: 80px;
                right: 30px;
            }
        }
    </style>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://n8n.srv907628.hstgr.cloud/webhook/1c543332-a2d1-479f-805d-3d0977af5d93/chat',
            initialMessages: [
                '¡Hola! Soy el coordinador de calendario de La Catrina Pool League. ¿Qué partido quieres agendar o consultar?'
            ],
            i18n: {
                en: {
                    title: 'La Catrina Pool League',
                    subtitle: 'Gestor de Calendario 2026',
                    getStarted: 'Iniciar chat',
                    inputPlaceholder: 'Escribe tu mensaje aquí...',
                    closeButtonTooltip: 'Cerrar chat'
                }
            }
        });
    </script>
</body>
</html>
