<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Catrina · Calendario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --gold: #d4af37;
      --text: #f3e7c2;
      --muted: #9e9e9e;
      --panel: rgba(8, 8, 8, 0.68);
      --border: rgba(212, 175, 55, 0.28);
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.86)),
        url('../material/imagen2.jpeg') center/cover no-repeat;
      z-index: -2;
    }
    .glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 10%, rgba(212,175,55,.18), transparent 35%),
        radial-gradient(circle at 50% 85%, rgba(0,150,136,.12), transparent 28%);
      z-index: -1;
      pointer-events: none;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
      padding: 20px;
    }
    .topbar {
      width: min(1400px, 100%);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand h1 {
      color: var(--gold);
      letter-spacing: 4px;
      font-size: clamp(2rem, 3vw, 3rem);
      text-shadow: 0 0 24px rgba(212,175,55,.35);
    }
    .brand p {
      color: var(--muted);
      font-size: .9rem;
      letter-spacing: 2px;
      margin-top: 6px;
    }
    .back {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.35);
      padding: 10px 14px;
      border-radius: 999px;
      transition: .2s ease;
      white-space: nowrap;
    }
    .back:hover {
      border-color: rgba(212,175,55,.7);
      background: rgba(212,175,55,.08);
    }
    .panel {
      width: min(1400px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      padding: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }
    .calendar-shell {
      width: 100%;
      min-height: calc(100vh - 190px);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: #0b0b0b;
    }
    iframe {
      display: block;
      width: 100%;
      min-height: calc(100vh - 190px);
      border: 0;
      background: white;
    }
    .footer {
      text-align: center;
      color: #666;
      font-size: .78rem;
      letter-spacing: 1px;
      padding-bottom: 6px;
    }
    @media (max-width: 900px) {
      .wrap { padding: 14px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .panel { padding: 12px; border-radius: 18px; }
      .calendar-shell, iframe { min-height: calc(100vh - 220px); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>LA CATRINA</h1>
        <p>POOL LEAGUE · CALENDARIO</p>
      </div>
      <a class="back" href="../">← Volver a la portada</a>
    </div>

    <main class="panel">
      <div class="calendar-shell">
        <iframe src="https://calendar.google.com/calendar/embed?height=800&wkst=2&ctz=Europe%2FMadrid&showPrint=0&title=Liga%20La%20Catrina%202026&mode=WEEK&showTabs=0&showCalendars=0&src=MjZiMmIxNGVmZGI4OGMwZjM4MGNhYjkzZjU5YjM0NjczOTcwMWRlZWEyNmEwMWM3YmUwZmE2ZDE0YjIwYTQ5MUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZXMuc3BhaW4jaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%237cb342&color=%23009688" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
      </div>
    </main>

    <div class="footer">La Catrina Pool League</div>
  </div>
</body>
</html>
