<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" id="favicon">
    <title>Diagnostic Dashboard - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }

        .header h1 {
            color: #d4af37;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
        }

        .filters {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            color: #888;
            font-weight: 600;
        }

        .filter-group select,
        .filter-group input {
            padding: 0.5rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 0.9rem;
            min-width: 150px;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #d4af37;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #d4af37;
        }

        .logs-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .logs-header h2 {
            font-size: 1.2rem;
            color: #fff;
        }

        .logs {
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 0.75rem;
            border-left: 3px solid #333;
            margin-bottom: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .log-entry.debug {
            border-left-color: #888;
        }

        .log-entry.info {
            border-left-color: #3b82f6;
        }

        .log-entry.warn {
            border-left-color: #f59e0b;
        }

        .log-entry.error {
            border-left-color: #ef4444;
        }

        .log-entry.critical {
            border-left-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .log-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
            color: #888;
            font-size: 0.75rem;
        }

        .log-message {
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .log-data {
            color: #666;
            font-size: 0.75rem;
            overflow-x: auto;
        }

        .log-data pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .empty {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .back-link {
            display: inline-block;
            color: #d4af37;
            text-decoration: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.debug {
            background: rgba(136, 136, 136, 0.2);
            color: #888;
        }

        .badge.info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .badge.warn {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge.critical {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to Home</a>

        <div class="header">
            <h1>Diagnostic Dashboard</h1>
            <p>Real-time application logging and diagnostics</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Logs</h3>
                <div class="value" id="statTotalLogs">-</div>
            </div>
            <div class="stat-card">
                <h3>Errors</h3>
                <div class="value" id="statErrors" style="color: #ef4444;">-</div>
            </div>
            <div class="stat-card">
                <h3>Critical</h3>
                <div class="value" id="statCritical" style="color: #f87171;">-</div>
            </div>
            <div class="stat-card">
                <h3>Match Lifecycle</h3>
                <div class="value" id="statMatchLifecycle" style="color: #3b82f6;">-</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="limitFilter">Limit</label>
                <select id="limitFilter">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter">
                    <option value="">All</option>
                    <option value="match_lifecycle">Match Lifecycle</option>
                    <option value="elo_calculation">ELO Calculation</option>
                    <option value="authentication">Authentication</option>
                    <option value="navigation">Navigation</option>
                    <option value="user_action">User Action</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="levelFilter">Level</label>
                <select id="levelFilter">
                    <option value="">All</option>
                    <option value="debug">Debug</option>
                    <option value="info">Info</option>
                    <option value="warn">Warning</option>
                    <option value="error">Error</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="hoursFilter">Time Range</label>
                <select id="hoursFilter">
                    <option value="1">Last 1 hour</option>
                    <option value="6">Last 6 hours</option>
                    <option value="24" selected>Last 24 hours</option>
                    <option value="48">Last 48 hours</option>
                    <option value="168">Last 7 days</option>
                </select>
            </div>
            <button class="btn" onclick="loadLogs()">Refresh</button>
            <button class="btn" onclick="clearLogs()">Clear Display</button>
        </div>

        <div class="logs-container">
            <div class="logs-header">
                <h2>Recent Logs</h2>
            </div>
            <div id="logsContainer" class="logs">
                <div class="loading">Loading logs...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        // Firebase config - same as main app
        const firebaseConfig = {
            apiKey: "AIzaSyBgyARlrVo-J1qIhu49Nfvif_p7xVVFW5s",
            authDomain: "elopool-f1e62.firebaseapp.com",
            databaseURL: "https://elopool-f1e62-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "elopool-f1e62",
            storageBucket: "elopool-f1e62.firebasestorage.app",
            messagingSenderId: "125100775441",
            appId: "1:125100775441:web:b61f62a308af5c678db9b0",
            measurementId: "G-BNZEK056MB"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Load logs with filters
        async function loadLogs() {
            const limit = parseInt(document.getElementById('limitFilter').value);
            const category = document.getElementById('categoryFilter').value || null;
            const level = document.getElementById('levelFilter').value || null;
            const hours = parseInt(document.getElementById('hoursFilter').value);

            try {
                let query = database.ref('diagnostic_logs').limitToLast(limit);

                const snapshot = await query.once('value');
                const logs = snapshot.val();

                if (!logs) {
                    document.getElementById('logsContainer').innerHTML = '<div class="empty">No logs found</div>';
                    updateStats({});
                    return;
                }

                let logsArray = Object.entries(logs)
                    .map(([key, log]) => ({ key, ...log }))
                    .sort((a, b) => b.timestamp - a.timestamp);

                // Filter by time
                const cutoffTime = Date.now() - (hours * 60 * 60 * 1000);
                logsArray = logsArray.filter(log => log.timestamp >= cutoffTime);

                // Filter by category
                if (category) {
                    logsArray = logsArray.filter(log => log.category === category);
                }

                // Filter by level
                if (level) {
                    logsArray = logsArray.filter(log => log.level === level);
                }

                renderLogs(logsArray);
                updateStats(logsArray);

            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logsContainer').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');

            if (logs.length === 0) {
                container.innerHTML = '<div class="empty">No logs match your filters</div>';
                return;
            }

            container.innerHTML = logs.map(log => {
                const date = new Date(log.timestamp);
                const timeStr = date.toLocaleString();

                let dataStr = '';
                if (log.data && Object.keys(log.data).length > 0) {
                    dataStr = `<div class="log-data"><pre>${JSON.stringify(log.data, null, 2)}</pre></div>`;
                }

                return `
                    <div class="log-entry ${log.level}">
                        <div class="log-header">
                            <span>${timeStr}</span>
                            <span class="badge ${log.level}">${log.level}</span>
                            <span style="color: #d4af37;">${log.category || 'system'}</span>
                            <span>Session: ${log.session_id || 'N/A'}</span>
                            ${log.username ? `<span>User: ${log.username}</span>` : ''}
                        </div>
                        <div class="log-message">${log.message}</div>
                        ${dataStr}
                    </div>
                `;
            }).join('');
        }

        function updateStats(logs) {
            const total = logs.length;
            const errors = logs.filter(l => l.level === 'error').length;
            const critical = logs.filter(l => l.level === 'critical').length;
            const matchLifecycle = logs.filter(l => l.category === 'match_lifecycle').length;

            document.getElementById('statTotalLogs').textContent = total;
            document.getElementById('statErrors').textContent = errors;
            document.getElementById('statCritical').textContent = critical;
            document.getElementById('statMatchLifecycle').textContent = matchLifecycle;
        }

        function clearLogs() {
            document.getElementById('logsContainer').innerHTML = '';
            document.getElementById('statTotalLogs').textContent = '-';
            document.getElementById('statErrors').textContent = '-';
            document.getElementById('statCritical').textContent = '-';
            document.getElementById('statMatchLifecycle').textContent = '-';
        }

        // Load initial logs
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();

            // Auto-refresh every 30 seconds
            setInterval(loadLogs, 30000);
        });
    </script>

<script>
// FAVICON ANIMADO: Bola de billar 8 rotando horizontalmente
const faviconCanvas = document.createElement('canvas');
faviconCanvas.width = 32;
faviconCanvas.height = 32;
const faviconCtx = faviconCanvas.getContext('2d');

function updateFavicon() {
    const time = Date.now() * 0.005;
    const rotation = Math.sin(time) * 0.15;

    faviconCtx.clearRect(0, 0, 32, 32);
    const cx = 16;
    const cy = 16;
    const radius = 14;

    const gradient = faviconCtx.createRadialGradient(
        cx - 3, cy - 3, 0,
        cx, cy, radius
    );
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.3, '#ffffff');
    gradient.addColorStop(0.5, '#0a0a0a');
    gradient.addColorStop(1, '#000000');

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.fillStyle = gradient;
    faviconCtx.fill();

    faviconCtx.save();
    faviconCtx.translate(cx, cy);
    faviconCtx.scale(1 + rotation * 0.5, 1);
    faviconCtx.translate(-cx, -cy);

    faviconCtx.fillStyle = '#ffffff';
    faviconCtx.font = 'bold 14px Arial';
    faviconCtx.textAlign = 'center';
    faviconCtx.textBaseline = 'middle';
    faviconCtx.fillText('8', cx, cy + 1);

    faviconCtx.restore();

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.strokeStyle = '#d4af37';
    faviconCtx.lineWidth = 2;
    faviconCtx.stroke();

    const link = document.getElementById('favicon');
    if (link) {
        link.href = faviconCanvas.toDataURL('image/png');
    }

    requestAnimationFrame(updateFavicon);
}

updateFavicon();
</script>
</body>
</html>
