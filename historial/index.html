<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" id="favicon">
    <title data-i18n-title="nav_history">Historial de Partidos - La Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-felt: #1a4a2e;
            --color-gold: #d4af37;
            --color-gold-light: #f4d03f;
            --color-white: #f5f5f5;
            --color-text-muted: #888;
            --color-success: #4ade80;
            --color-danger: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            color: var(--color-white);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .header {
            background: linear-gradient(180deg, rgba(26, 74, 46, 0.3) 0%, transparent 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--color-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .user-info {
            color: var(--color-white);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--color-gold);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 100;
        }

        .header-right {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-muted);
        }

        .match-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .match-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .match-players {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-weight: 600;
            font-size: 1.1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-info.winner .player-name {
            color: var(--color-gold);
        }

        .player-info.loser .player-name {
            color: var(--color-text-muted);
        }

        .winner-tag {
            font-size: 0.7rem;
            color: var(--color-gold);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .match-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .match-type {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(212, 175, 55, 0.15);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 8px;
            color: var(--color-gold);
            font-weight: 600;
        }

        .elo-change {
            font-weight: 600;
        }

        .elo-change.positive {
            color: var(--color-success);
        }

        .elo-change.negative {
            color: var(--color-danger);
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        .no-matches {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-text-muted);
        }

        .no-matches-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="../" class="back-link" data-i18n="back">← Volver</a>
        <div class="header-right">
            <div id="langSelectorContainer" style="margin-right: 15px;"></div>
            <div id="notificationBellContainer"></div>
            <button class="logout-btn" onclick="logout()" data-i18n="logout">Cerrar Sesión</button>
        </div>
        <h1 data-i18n="nav_history">HISTORIAL DE PARTIDOS</h1>
        <div class="user-info"><span data-i18n="login_username">Usuario</span>: <span id="currentUsername">-</span></div>
    </div>

    <div class="container">
        <div class="card">
            <div id="loadingScreen">
                <div class="loading" data-i18n="loading">Cargando...</div>
            </div>
            
            <div id="matchesScreen" class="hidden">
                <div id="matchesContainer"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>La Catrina Pool League &copy; 2026</p>
    </div>

    <!-- Firebase Scripts -->
    <script src="../js/firebase.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/translations.js"></script>
    
    <script>
        // Variables globales
        let currentUserData = null;
        let allMatches = [];

        // Esperar a que Firebase esté listo
        async function waitForFirebase() {
            let attempts = 0;
            while (!window.firebase && attempts < 20) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            return !!window.firebase;
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            const ready = await waitForFirebase();
            if (!ready) {
                document.getElementById('loadingScreen').innerHTML = '<div class="loading">Error cargando Firebase</div>';
                return;
            }

            initFirebase();

            // Cargar partidos inmediatamente (PÚBLICO)
            await loadAllMatches();
            
            // Mostrar contenido tras la primera carga
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('matchesScreen').classList.remove('hidden');

            // Manejar estado de sesión (opcional para el header)
            onAuthStateChanged(async (user) => {
                if (user) {
                    await loadUserData(user);
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                } else {
                    document.getElementById('logoutBtn').classList.add('hidden');
                    document.getElementById('userInfo').classList.add('hidden');
                }
            });

            // Selector de idioma y notificaciones (públicos)
            const langContainer = document.getElementById('langSelectorContainer');
            if (langContainer) {
                langContainer.innerHTML = createLanguageSelector();
            }
            
            const bellContainer = document.getElementById('notificationBellContainer');
            if (bellContainer) {
                bellContainer.innerHTML = createNotificationBell();
            }
        });

        async function loadUserData(user) {
            try {
                const userData = await getUserData(user.uid);
                if (userData) {
                    currentUserData = userData;
                    document.getElementById('currentUsername').textContent = currentUserData.username;
                    await updateNotificationBell(user.uid);
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        function formatMatchDate(timestamp) {
            if (!timestamp) return 'Fecha desconocida';
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) return 'Fecha inválida';
            
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }

        async function loadAllMatches() {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = `<div class="loading">${t('loading')}</div>`;
            
            try {
                if (typeof database === 'undefined' || !database.ref) {
                    container.innerHTML = '<div class="loading">Firebase no está inicializado</div>';
                    return;
                }

                const matchesSnap = await database.ref('matches').once('value');
                const matches = matchesSnap.val();
                
                if (!matches) {
                    container.innerHTML = `
                        <div class="no-matches">
                            <div class="no-matches-icon">📋</div>
                            <div>No hay partidos registrados aún</div>
                        </div>
                    `;
                    return;
                }
                
                // Convertir a array y ordenar por fecha (más recientes primero)
                // Usamos timestamp o confirmed_at o created_at
                allMatches = Object.entries(matches)
                    .map(([matchId, match]) => ({ 
                        matchId, 
                        ...match,
                        sortTimestamp: match.timestamp || match.confirmed_at || match.created_at || 0
                    }))
                    .filter(match => match.status === 'confirmed' && !match.hidden) // Solo mostramos los confirmados y no ocultos
                    .sort((a, b) => b.sortTimestamp - a.sortTimestamp);
                
                const html = allMatches.map(match => {
                    const matchDate = formatMatchDate(match.sortTimestamp);
                    const confirmDate = match.confirmed_at ? formatMatchDate(match.confirmed_at) : null;
                    
                    // Lógica robusta de nombres
                    const winnerId = match.winner_id;
                    const p1Id = match.player1_id;
                    const p2Id = match.player2_id;
                    
                    let winnerName, loserName;
                    
                    if (winnerId === p1Id) {
                        winnerName = match.player1_username || 'Desconocido';
                        loserName = match.player2_username || 'Desconocido';
                    } else if (winnerId === p2Id) {
                        winnerName = match.player2_username || 'Desconocido';
                        loserName = match.player1_username || 'Desconocido';
                    } else {
                        // Si no hay IDs claros, intentar por campos directos
                        winnerName = match.winner_username || 'Desconocido';
                        loserName = (match.player1_username === winnerName) ? match.player2_username : match.player1_username;
                        if (!loserName) loserName = 'Desconocido';
                    }
                    
                    // Cambios de ELO
                    const winEloChange = match.winner_elo_change !== undefined ? match.winner_elo_change : 0;
                    const loseEloChange = match.loser_elo_change !== undefined ? match.loser_elo_change : 0;
                    
                    const matchTypeKey = `match_type_${match.match_type}`;
                    const matchTypeName = t(matchTypeKey) !== matchTypeKey ? t(matchTypeKey) : (match.match_type || 'Partido');
                    
                    return `
                        <div class="match-item">
                            <div class="match-header">
                                <span class="match-type">${matchTypeName}</span>
                                <span style="color: #888; font-size: 0.75rem;">${matchDate}</span>
                            </div>
                            <div class="match-players">
                                <div class="player-info winner">
                                    <span class="winner-tag">GANADOR</span>
                                    <span class="player-name">${winnerName}</span>
                                    <span class="elo-change positive">+${winEloChange} ELO</span>
                                </div>
                                <div style="color: #666; font-weight: 900; font-style: italic;">VS</div>
                                <div class="player-info loser">
                                    <span class="winner-tag" style="opacity: 0;">-</span>
                                    <span class="player-name">${loserName}</span>
                                    <span class="elo-change negative">${loseEloChange >= 0 ? '-' : ''}${Math.abs(loseEloChange)} ELO</span>
                                </div>
                            </div>
                            <div class="match-details">
                                <span>ID: ${match.matchId.substring(0, 8)}...</span>
                                <span>${confirmDate ? `Confirmado: ${confirmDate}` : ''}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading matches:', error);
                container.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }
    </script>

<script>
// FAVICON ANIMADO: Bola de billar 8 rotando horizontalmente
const faviconCanvas = document.createElement('canvas');
faviconCanvas.width = 32;
faviconCanvas.height = 32;
const faviconCtx = faviconCanvas.getContext('2d');

function updateFavicon() {
    const time = Date.now() * 0.005;
    const rotation = Math.sin(time) * 0.15;

    faviconCtx.clearRect(0, 0, 32, 32);
    const cx = 16;
    const cy = 16;
    const radius = 14;

    const gradient = faviconCtx.createRadialGradient(
        cx - 3, cy - 3, 0,
        cx, cy, radius
    );
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.3, '#ffffff');
    gradient.addColorStop(0.5, '#0a0a0a');
    gradient.addColorStop(1, '#000000');

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.fillStyle = gradient;
    faviconCtx.fill();

    faviconCtx.save();
    faviconCtx.translate(cx, cy);
    faviconCtx.scale(1 + rotation * 0.5, 1);
    faviconCtx.translate(-cx, -cy);

    faviconCtx.fillStyle = '#ffffff';
    faviconCtx.font = 'bold 14px Arial';
    faviconCtx.textAlign = 'center';
    faviconCtx.textBaseline = 'middle';
    faviconCtx.fillText('8', cx, cy + 1);

    faviconCtx.restore();

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.strokeStyle = '#d4af37';
    faviconCtx.lineWidth = 2;
    faviconCtx.stroke();

    const link = document.getElementById('favicon');
    if (link) {
        link.href = faviconCanvas.toDataURL('image/png');
    }

    requestAnimationFrame(updateFavicon);
}

updateFavicon();
</script>
</body>
</html>
