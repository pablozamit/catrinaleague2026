<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --black: #0a0a0a;
            --white: #f5f5f5;
            --muted: #666;
            --felt: #1a4d2e;
            
            --font-display: 'Cinzel', serif;
            --font-serif: 'EB Garamond', serif;
            --font-ui: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--gold);
            color: var(--black);
            font-family: var(--font-ui);
            min-height: 100vh;
        }

        .header-section {
            padding: 4vw;
            background: var(--black);
            position: relative;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%);
            opacity: 0.5;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .packed-text {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .title-main {
            font-family: var(--font-display);
            font-size: 20vw;
            letter-spacing: -0.02em;
            width: 100%;
            margin-bottom: -1vw;
            color: var(--gold);
        }

        .title-sub {
            font-family: var(--font-display);
            font-size: 12vw;
            letter-spacing: -0.01em;
            color: var(--white);
        }

        .meta-block {
            font-family: var(--font-ui);
            font-size: 2.5vw;
            line-height: 1.2;
            width: 40%;
            margin-left: auto;
            text-align: right;
            font-weight: 600;
            color: var(--muted);
        }

        .sub-meta {
            font-family: var(--font-serif);
            font-size: 3vw;
            line-height: 1.1;
            margin-top: 2vw;
            width: 70%;
            color: var(--white);
            opacity: 0.7;
        }

        .team-buttons {
            display: flex;
            justify-content: center;
            gap: 2vw;
            padding: 3vw;
            background: var(--black);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .team-btn {
            font-family: var(--font-display);
            font-size: 4vw;
            color: var(--muted);
            background: transparent;
            border: 2px solid var(--muted);
            border-radius: 50%;
            width: 12vw;
            height: 12vw;
            max-width: 60px;
            max-height: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .team-btn.active {
            color: var(--black);
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .team-btn:hover:not(.active) {
            border-color: var(--gold);
            color: var(--gold);
        }

        .data-section {
            background-color: var(--black);
            color: var(--white);
            padding: 4vw;
            min-height: calc(100vh - 50vw);
        }

        .bg-letters {
            position: absolute;
            bottom: 10vw;
            left: 0;
            font-family: var(--font-display);
            font-size: 50vw;
            line-height: 0.7;
            color: var(--white);
            opacity: 0.03;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 2vw;
            margin-bottom: 3vw;
            position: relative;
            z-index: 2;
        }

        .team-title {
            font-family: var(--font-display);
            font-size: 8vw;
            letter-spacing: 0.02em;
            color: var(--gold);
        }

        .team-stats {
            font-family: var(--font-ui);
            font-size: 2.5vw;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.5);
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 15vw 15vw 15vw 18vw;
            padding: 2vw 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-family: var(--font-ui);
            font-size: 2.5vw;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            z-index: 2;
        }

        .table-header span:nth-child(1) { text-align: left; }
        .table-header span:nth-child(2) { text-align: center; }
        .table-header span:nth-child(3) { text-align: center; }
        .table-header span:nth-child(4) { text-align: center; }
        .table-header span:nth-child(5) { text-align: right; }

        .player-list {
            list-style: none;
            position: relative;
            z-index: 2;
        }

        .player-row {
            display: grid;
            grid-template-columns: 1fr 15vw 15vw 15vw 18vw;
            align-items: center;
            padding: 3vw 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .player-row:first-child .player-rank {
            color: var(--gold);
        }

        .player-rank {
            font-family: var(--font-display);
            font-size: 5vw;
            color: var(--muted);
        }

        .player-name {
            font-family: var(--font-serif);
            font-size: 4.5vw;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--white);
        }

        .player-stat {
            font-family: var(--font-display);
            font-size: 4vw;
            text-align: center;
            color: var(--white);
        }

        .player-pts {
            font-family: var(--font-display);
            font-size: 5vw;
            text-align: right;
            color: var(--gold);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 8vw;
            color: var(--gold);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (min-width: 768px) {
            .title-main { font-size: 10rem; }
            .title-sub { font-size: 6rem; }
            .meta-block { font-size: 0.9rem; width: 25%; }
            .sub-meta { font-size: 1.2rem; width: 60%; }
            .team-btn { font-size: 1.5rem; width: 50px; height: 50px; }
            .team-title { font-size: 3rem; }
            .team-stats { font-size: 0.8rem; }
            .table-header { font-size: 0.8rem; padding: 10px 0; }
            .player-rank { font-size: 2rem; }
            .player-name { font-size: 1.5rem; }
            .player-stat { font-size: 1.5rem; }
            .player-pts { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">LIGA</div>
    </div>

    <header class="header-section">
        <div class="header-bg"></div>
        <div class="header-content">
            <div class="packed-text">
                <div class="title-main">LIGA</div>
                <div class="title-sub">2026</div>
                <div class="meta-block">
                    LA CATRINA<br>POOL LEAGUE<br>TEMPORADA 1
                </div>
            </div>
            
            <div class="sub-meta">
                Sistema de puntuación: Victoria (3 pts) · Punto de mérito (1 pt) · Derrota (0 pts)
            </div>
        </div>
    </header>

    <div class="team-buttons" id="teamButtons"></div>

    <main class="data-section">
        <div class="bg-letters">TEAM</div>
        
        <div class="team-header">
            <div class="team-title" id="teamTitle">EQUIPO 1</div>
            <div class="team-stats" id="teamStats">Grupo 1 / 6</div>
        </div>

        <div class="table-header">
            <span>Jugador</span>
            <span>PJ</span>
            <span>G</span>
            <span>P</span>
            <span>Pts</span>
        </div>

        <ul class="player-list" id="playerList"></ul>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgyARlrVo-J1qIhu49Nfvif_p7xVVFW5s",
            authDomain: "elopool-f1e62.firebaseapp.com",
            databaseURL: "https://elopool-f1e62-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "elopool-f1e62",
            storageBucket: "elopool-f1e62.firebasestorage.app",
            messagingSenderId: "125100775441",
            appId: "1:125100775441:web:b61f62a308af5c678db9b0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const teams = [
            { id: 1, players: ['johnny', 'mo'] },
            { id: 2, players: ['artur', 'sergio'] },
            { id: 3, players: ['amauris', 'sasa'] },
            { id: 4, players: ['fer', 'katee'] },
            { id: 5, players: ['jack', 'jonathan'] },
            { id: 6, players: ['pablo', 'joe'] }
        ];

        let currentTeamIndex = 0;
        let teamData = [];

        const teamTitle = document.getElementById('teamTitle');
        const teamStats = document.getElementById('teamStats');
        const playerList = document.getElementById('playerList');
        const teamButtons = document.getElementById('teamButtons');
        const loadingScreen = document.getElementById('loadingScreen');

        async function loadTeamData() {
            const snapshot = await database.ref('users').once('value');
            const users = snapshot.val();
            
            return teams.map(team => {
                const players = team.players.map(playerName => {
                    const userEntry = Object.entries(users).find(
                        ([, data]) => (data.username || '').toLowerCase() === playerName.toLowerCase()
                    );
                    
                    if (userEntry) {
                        const [, data] = userEntry;
                        const played = data.matches_played || 0;
                        const wins = data.matches_won || 0;
                        const losses = played - wins;
                        const points = wins * 3;
                        
                        return {
                            name: data.username || playerName,
                            played,
                            wins,
                            losses,
                            points
                        };
                    }
                    return {
                        name: playerName,
                        played: 0,
                        wins: 0,
                        losses: 0,
                        points: 0
                    };
                });

                return {
                    id: team.id,
                    players
                };
            });
        }

        function renderTeamButtons() {
            teamButtons.innerHTML = '';
            teams.forEach((team, index) => {
                const btn = document.createElement('button');
                btn.className = `team-btn ${index === currentTeamIndex ? 'active' : ''}`;
                btn.textContent = team.id;
                btn.onclick = () => switchTeam(index);
                teamButtons.appendChild(btn);
            });
        }

        function switchTeam(index) {
            currentTeamIndex = index;
            renderTeamButtons();
            renderTeam(index);
        }

        function renderTeam(index) {
            const team = teamData[index];
            
            teamTitle.innerText = `EQUIPO ${team.id}`;
            teamStats.innerText = `Grupo ${team.id} / ${teamData.length}`;

            playerList.innerHTML = '';
            team.players.forEach((player, i) => {
                const li = document.createElement('li');
                li.className = 'player-row';
                
                li.innerHTML = `
                    <div class="player-rank">${i + 1}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-stat">${player.played}</div>
                    <div class="player-stat">${player.wins}</div>
                    <div class="player-stat">${player.losses}</div>
                    <div class="player-pts">${player.points}</div>
                `;
                playerList.appendChild(li);
            });
        }

        async function init() {
            try {
                teamData = await loadTeamData();
                renderTeamButtons();
                renderTeam(currentTeamIndex);
                loadingScreen.classList.add('hidden');
            } catch (error) {
                console.error('Error loading team data:', error);
                loadingScreen.innerHTML = '<div class="loading-text" style="font-size: 1rem;">Error cargando datos</div>';
            }
        }

        init();
    </script>
</body>
</html>
