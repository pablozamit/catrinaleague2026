<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --black: #0a0a0a;
            --white: #f5f5f5;
            --muted: #666;
            --felt: #1a4d2e;

            --font-display: 'Cinzel', serif;
            --font-serif: 'EB Garamond', serif;
            --font-ui: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--gold);
            color: var(--black);
            font-family: var(--font-ui);
            min-height: 100vh;
        }

        body.modal-open {
            overflow: hidden;
        }

        .header-section {
            padding: 4vw;
            background: var(--black);
            position: relative;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%);
            opacity: 0.5;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .packed-text {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .title-main {
            font-family: var(--font-display);
            font-size: 20vw;
            letter-spacing: -0.02em;
            width: 100%;
            margin-bottom: -1vw;
            color: var(--gold);
        }

        .title-sub {
            font-family: var(--font-display);
            font-size: 12vw;
            letter-spacing: -0.01em;
            color: var(--white);
        }

        .meta-block {
            font-family: var(--font-ui);
            font-size: 2.5vw;
            line-height: 1.2;
            width: 40%;
            margin-left: auto;
            text-align: right;
            font-weight: 600;
            color: var(--muted);
        }

        .sub-meta {
            font-family: var(--font-serif);
            font-size: 3vw;
            line-height: 1.1;
            margin-top: 2vw;
            width: 70%;
            color: var(--white);
            opacity: 0.7;
        }

        .team-buttons {
            display: flex;
            justify-content: center;
            gap: 2vw;
            padding: 3vw;
            background: var(--black);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .team-btn {
            font-family: var(--font-display);
            font-size: 4vw;
            color: var(--muted);
            background: transparent;
            border: 2px solid var(--muted);
            border-radius: 50%;
            width: 12vw;
            height: 12vw;
            max-width: 60px;
            max-height: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .team-btn.active {
            color: var(--black);
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .team-btn:hover:not(.active) {
            border-color: var(--gold);
            color: var(--gold);
        }

        .data-section {
            position: relative;
            background-color: var(--black);
            color: var(--white);
            padding: 4vw;
            min-height: calc(100vh - 50vw);
            overflow: hidden;
        }

        .bg-letters {
            position: absolute;
            bottom: 10vw;
            left: 0;
            font-family: var(--font-display);
            font-size: 50vw;
            line-height: 0.7;
            color: var(--white);
            opacity: 0.03;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 2vw;
            margin-bottom: 3vw;
            position: relative;
            z-index: 2;
        }

        .team-title {
            font-family: var(--font-display);
            font-size: 8vw;
            letter-spacing: 0.02em;
            color: var(--gold);
        }

        .team-stats {
            font-family: var(--font-ui);
            font-size: 2.5vw;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.5);
            text-align: right;
        }

        .table-header {
            display: grid;
            grid-template-columns: 35px minmax(80px, 2fr) 45px repeat(6, 1fr) 45px;
            gap: 5px;
            padding: 2vw 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-family: var(--font-ui);
            font-size: 2.5vw;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 2;
        }

        .table-header span {
            text-align: center;
        }

        .table-header span:nth-child(2) {
            text-align: left;
        }

        .table-header span:nth-child(10) {
            text-align: right;
        }

        .table-header span:nth-child(3) {
            opacity: 0.5;
        }

        .player-list {
            list-style: none;
            position: relative;
            z-index: 2;
        }

        .player-row {
            display: grid;
            grid-template-columns: 35px minmax(80px, 2fr) 45px repeat(6, 1fr) 45px;
            gap: 5px;
            align-items: center;
            padding: 3vw 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background-color 0.2s ease;
        }

        .player-row:hover {
            background-color: rgba(212, 175, 55, 0.06);
        }

        .player-row:first-child .player-rank {
            color: var(--gold);
        }

        .player-rank {
            font-family: var(--font-display);
            font-size: 4vw;
            text-align: center;
            color: var(--muted);
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
        }

        .player-rank.silhouette-effect {
            background-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .silhouette-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: grayscale(80%) brightness(0.5) contrast(2);
            z-index: 0;
        }

        .player-rank.silhouette-effect:hover .silhouette-bg {
            opacity: 0.85;
        }

        .player-rank.silhouette-effect:hover {
            transform: scale(1.03);
        }

        .player-number {
            position: relative;
            z-index: 1;
            color: rgba(255, 255, 255, 0.95);
            font-size: 3vw;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 1), -1px -1px 4px rgba(0, 0, 0, 1);
        }

        .player-name-cell {
            min-width: 0;
        }

        .player-name-btn {
            all: unset;
            display: block;
            width: 100%;
            min-width: 0;
            font-family: var(--font-serif);
            font-size: 4vw;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--white);
            cursor: pointer;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .player-name-btn:hover,
        .player-name-btn:focus-visible {
            color: var(--gold-light);
            opacity: 1;
        }

        .player-name-btn:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .player-name-static {
            display: block;
            width: 100%;
            min-width: 0;
            font-family: var(--font-serif);
            font-size: 4vw;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--white);
        }

        .player-animation {
            width: 12vw;
            height: 8vw;
            max-width: 80px;
            max-height: 50px;
            border-radius: 4px;
            object-fit: cover;
        }

        .player-anim-cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-stat {
            font-family: var(--font-display);
            font-size: 2.8vw;
            text-align: center;
            color: var(--white);
        }

        .player-pts {
            font-family: var(--font-display);
            font-size: 4vw;
            text-align: right;
            color: var(--gold);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 8vw;
            color: var(--gold);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.is-open {
            display: flex;
        }

        .modal-content {
            position: relative;
            background-color: var(--black);
            margin: auto;
            padding: 30px;
            border: 2px solid var(--gold);
            width: 100%;
            max-width: 760px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--white);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            background: transparent;
            border: 0;
        }

        .close:hover,
        .close:focus-visible {
            color: var(--gold);
        }

        .modal-player-name {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 8px;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .modal-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.65);
            font-size: 0.9rem;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .history-container {
            margin-top: 10px;
        }

        .history-header-row {
            display: grid;
            grid-template-columns: 2fr 1fr 0.8fr 1.2fr;
            gap: 10px;
            padding: 10px;
            font-family: var(--font-ui);
            font-size: 0.78rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
            border-bottom: 2px solid var(--gold);
        }

        .history-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .history-row {
            display: grid;
            grid-template-columns: 2fr 1fr 0.8fr 1.2fr;
            gap: 10px;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            align-items: center;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            color: var(--white);
        }

        .history-row:last-child {
            border-bottom: none;
        }

        .history-row .opponent {
            font-weight: 600;
            text-transform: capitalize;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-row .score {
            text-align: center;
            font-family: var(--font-display);
        }

        .history-row .pts {
            text-align: center;
            font-weight: bold;
        }

        .history-row .date {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        .history-row.win {
            border-left: 4px solid #4caf50;
            background: linear-gradient(90deg, rgba(76, 175, 80, 0.1) 0%, transparent 100%);
        }

        .history-row.loss {
            border-left: 4px solid #f44336;
            background: linear-gradient(90deg, rgba(244, 67, 54, 0.1) 0%, transparent 100%);
        }

        .history-row.merit {
            border-left: 4px solid var(--gold);
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
        }

        .no-matches {
            padding: 30px;
            text-align: center;
            color: var(--muted);
            font-style: italic;
        }

        @media (max-width: 767px) {
            .history-header-row,
            .history-row {
                grid-template-columns: 1.5fr 1fr 0.8fr;
            }

            .history-header-row span:last-child,
            .history-row .date {
                display: none;
            }
        }

        @media (min-width: 768px) {
            .title-main { font-size: 10rem; }
            .title-sub { font-size: 6rem; }
            .meta-block { font-size: 0.9rem; width: 25%; }
            .sub-meta { font-size: 1.2rem; width: 60%; }
            .team-btn { font-size: 1.5rem; width: 50px; height: 50px; }
            .team-title { font-size: 3rem; }
            .team-stats { font-size: 0.8rem; }
            .table-header { font-size: 0.75rem; padding: 10px 0; letter-spacing: 0.08em; }

            .table-header,
            .player-row {
                grid-template-columns: 40px minmax(120px, 2fr) 60px repeat(6, 60px) 55px;
                gap: 8px;
            }

            .player-rank { font-size: 1.4rem; }
            .player-name-btn,
            .player-name-static { font-size: 1.1rem; }
            .player-stat { font-size: 1.1rem; }
            .player-pts { font-size: 1.4rem; }
            .player-number { font-size: 1.5rem; }
            .player-row { padding: 14px 0; }
            .player-animation { width: 50px; height: 35px; }
        }
    </style>
</head>
<body>

    <header class="header-section">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgyARlrVo-J1qIhu49Nfvif_p7xVVFW5s",
            authDomain: "elopool-f1e62.firebaseapp.com",
            databaseURL: "https://elopool-f1e62-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "elopool-f1e62",
            storageBucket: "elopool-f1e62.firebasestorage.app",
            messagingSenderId: "125100775441",
            appId: "1:125100775441:web:b61f62a308af5c678db9b0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const teams = [
            { id: 1, players: ['johnny', 'andres', 'mo', 'david', 'nica', 'danilo'] },
            { id: 2, name: 'JAMPOOLEROS TEAM', players: ['artur', 'sergio', 'alexf', 'jorge', 'alexb', 'sol'] },
            { id: 3, players: ['amauris', 'sasa', 'angel', 'erfan', 'nino', 'damian'] },
            { id: 4, name: 'ITCHY ARMPITS', players: ['jack', 'jonathan', 'connor', 'charles', 'lucas', 'favio'] },
            { id: 5, name: 'MACHACADORAS CON ACTITUD', players: ['fer', 'katee', 'enrique', 'mina', 'ruth', 'rauls'] },
            { id: 6, name: 'MICROPLÁSTICOS EN LOS COJONES S.L.', players: ['pablo', 'joe', 'lucasc', 'joel', 'roman', 'manuela'] },
            { id: 'G', isGlobal: true }
        ];

        let currentTeamIndex = 0;
        let teamData = [];
        let ligaMatches = [];

        const teamTitle = document.getElementById('teamTitle');
        const teamStats = document.getElementById('teamStats');
        const playerList = document.getElementById('playerList');
        const teamButtons = document.getElementById('teamButtons');
        const loadingScreen = document.getElementById('loadingScreen');

        const modal = document.getElementById('playerModal');
        const closeModal = document.getElementById('closeModal');
        const modalPlayerName = document.getElementById('modalPlayerName');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const historyList = document.getElementById('historyList');

        function normalizeName(value) {
            return String(value || '').trim().toLowerCase();
        }

        function formatDisplayName(value) {
            return String(value || '').trim();
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';
            const date = new Date(timestamp);
            if (Number.isNaN(date.getTime())) return '—';

            return new Intl.DateTimeFormat('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: '2-digit'
            }).format(date);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadTeamData() {
            try {
                const snapshot = await database.ref('liga/stats').once('value');
                const stats = snapshot.val() || {};

                return teams.map(team => {
                    let players = [];

                    if (team.isGlobal) {
                        const nonGlobalTeams = teams.filter(t => !t.isGlobal);
                        players = nonGlobalTeams.map(t => {
                            let tPlayed = 0;
                            let tWins = 0;
                            let tLosses = 0;
                            let tFramesWon = 0;
                            let tFramesLost = 0;
                            let tPts = 0;

                            t.players.forEach(p => {
                                const pStats = stats[p] || {};
                                tPlayed += pStats.played || 0;
                                tWins += pStats.wins || 0;
                                tLosses += pStats.losses || 0;
                                tFramesWon += pStats.framesWon || 0;
                                tFramesLost += pStats.framesLost || 0;
                                tPts += pStats.points || 0;
                            });

                            const tPerc = (tFramesWon + tFramesLost) > 0
                                ? ((tFramesWon / (tFramesWon + tFramesLost)) * 100).toFixed(1) + '%'
                                : '0.0%';

                            return {
                                name: t.name || `Equipo ${t.id}`,
                                isTeam: true,
                                played: tPlayed,
                                wins: tWins,
                                losses: tLosses,
                                framesWon: tFramesWon,
                                framesLost: tFramesLost,
                                percFrames: tPerc,
                                points: tPts
                            };
                        });
                    } else {
                        players = team.players.map(playerName => {
                            const playerStats = stats[playerName] || {};
                            const fW = playerStats.framesWon || 0;
                            const fL = playerStats.framesLost || 0;
                            const perc = (fW + fL) > 0
                                ? ((fW / (fW + fL)) * 100).toFixed(1) + '%'
                                : '0.0%';

                            return {
                                name: playerName,
                                played: playerStats.played || 0,
                                wins: playerStats.wins || 0,
                                losses: playerStats.losses || 0,
                                framesWon: fW,
                                framesLost: fL,
                                percFrames: perc,
                                points: playerStats.points || 0
                            };
                        });
                    }

                    players.sort((a, b) => b.points - a.points);

                    return {
                        id: team.id,
                        name: team.name || `EQUIPO ${team.id}`,
                        isGlobal: team.isGlobal,
                        players
                    };
                });
            } catch (error) {
                console.error("Error cargando stats de liga:", error);
                throw error;
            }
        }

        function normalizeMatch(id, rawMatch) {
            const raw = rawMatch || {};

            const player1 = formatDisplayName(raw.player1);
            const player2 = formatDisplayName(raw.player2);
            const winnerId = formatDisplayName(raw.winnerId || raw.winner);
            const loserId = formatDisplayName(raw.loserId || raw.loser);

            const normalized = {
                id,
                timestamp: raw.timestamp || 0,
                winnerId,
                loserId,
                player1,
                player2,
                winnerTeam: raw.winnerTeam ?? null,
                loserTeam: raw.loserTeam ?? null,
                winnerFrames: raw.winnerFrames ?? null,
                loserFrames: raw.loserFrames ?? null,
                frames1: raw.frames1 ?? null,
                frames2: raw.frames2 ?? null,
                winnerPointsAwarded: raw.winnerPointsAwarded ?? null,
                loserPointsAwarded: raw.loserPointsAwarded ?? null,
                meritAwarded: Boolean(raw.merit_awarded),
                raw: raw
            };

            if (!normalized.winnerId && player1 && player2 && raw.winner) {
                normalized.winnerId = formatDisplayName(raw.winner);
            }

            if (!normalized.loserId && normalized.winnerId && player1 && player2) {
                const winnerKey = normalizeName(normalized.winnerId);
                normalized.loserId = normalizeName(player1) === winnerKey ? player2 : player1;
            }

            return normalized;
        }

        async function loadMatches() {
            try {
                const snapshot = await database.ref('liga/matches').once('value');
                const matches = snapshot.val() || {};

                return Object.entries(matches)
                    .map(([id, value]) => normalizeMatch(id, value))
                    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            } catch (error) {
                console.error("Error cargando partidas:", error);
                return [];
            }
        }

        function renderTeamButtons() {
            teamButtons.innerHTML = '';

            teams.forEach((team, index) => {
                const btn = document.createElement('button');
                btn.className = `team-btn ${index === currentTeamIndex ? 'active' : ''}`;
                btn.textContent = team.id;
                btn.type = 'button';
                btn.onclick = () => switchTeam(index);
                teamButtons.appendChild(btn);
            });
        }

        function switchTeam(index) {
            currentTeamIndex = index;
            renderTeamButtons();
            renderTeam(index);
        }

        function createNameCell(playerName, isGlobal) {
            const wrapper = document.createElement('div');
            wrapper.className = 'player-name-cell';

            if (isGlobal) {
                const span = document.createElement('span');
                span.className = 'player-name-static';
                span.textContent = playerName;
                wrapper.appendChild(span);
                return wrapper;
            }

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'player-name-btn';
            button.textContent = playerName;
            button.setAttribute('aria-label', `Ver historial de ${playerName}`);
            button.addEventListener('click', (event) => {
                event.stopPropagation();
                showPlayerHistory(playerName);
            });

            wrapper.appendChild(button);
            return wrapper;
        }

        function renderTeam(index) {
            const team = teamData[index];
            const tableHeaderName = document.getElementById('tableHeader').children[1];

            if (team.isGlobal) {
                teamTitle.innerText = 'GRUPO GLOBAL';
                teamStats.innerText = 'Clasificación de Equipos';
                tableHeaderName.innerText = 'Equipo';
            } else {
                teamTitle.innerText = team.name || `EQUIPO ${team.id}`;
                teamStats.innerText = `Grupo ${team.id} / ${teamData.length - 1}`;
                tableHeaderName.innerText = 'Jugador';
            }

            playerList.innerHTML = '';

            team.players.forEach((player, i) => {
                const li = document.createElement('li');
                li.className = 'player-row';

                const rankDiv = document.createElement('div');
                rankDiv.className = 'player-rank';

                if (!team.isGlobal && (player.name === 'johnny' || player.name === 'artur')) {
                    rankDiv.classList.add('silhouette-effect');
                    rankDiv.setAttribute('data-player', player.name);

                    const bgDiv = document.createElement('div');
                    bgDiv.className = 'silhouette-bg';

                    if (player.name === 'johnny') bgDiv.style.backgroundImage = "url('/assets/players/johnnycard.png')";
                    if (player.name === 'artur') bgDiv.style.backgroundImage = "url('/assets/players/artur.jpg')";

                    rankDiv.appendChild(bgDiv);

                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'player-number';
                    numberSpan.textContent = i + 1;
                    rankDiv.appendChild(numberSpan);
                } else {
                    rankDiv.textContent = i + 1;
                }

                li.appendChild(rankDiv);
                li.appendChild(createNameCell(player.name, team.isGlobal));

                const animDiv = document.createElement('div');
                animDiv.className = 'player-anim-cell';

                if (!team.isGlobal && (player.name.toLowerCase() === 'johnny' || player.name.toLowerCase() === 'artur')) {
                    const video = document.createElement('video');
                    video.src = player.name.toLowerCase() === 'johnny'
                        ? '../material/johnny_animation.mp4'
                        : '../material/artur_animation.mp4';
                    video.className = 'player-animation';
                    video.autoplay = true;
                    video.loop = true;
                    video.muted = true;
                    video.playsInline = true;
                    animDiv.appendChild(video);
                }

                li.appendChild(animDiv);

                const metrics = [
                    player.played,
                    player.wins,
                    player.losses,
                    player.framesWon,
                    player.framesLost,
                    player.percFrames
                ];

                metrics.forEach(val => {
                    const statDiv = document.createElement('div');
                    statDiv.className = 'player-stat';
                    statDiv.textContent = val;
                    li.appendChild(statDiv);
                });

                const ptsDiv = document.createElement('div');
                ptsDiv.className = 'player-pts';
                ptsDiv.textContent = player.points;
                li.appendChild(ptsDiv);

                playerList.appendChild(li);
            });
        }

        function getPlayerHistoryRows(playerName) {
            const target = normalizeName(playerName);

            return ligaMatches
                .filter(match => {
                    const winnerKey = normalizeName(match.winnerId);
                    const loserKey = normalizeName(match.loserId);
                    const p1Key = normalizeName(match.player1);
                    const p2Key = normalizeName(match.player2);

                    return winnerKey === target || loserKey === target || p1Key === target || p2Key === target;
                })
                .map(match => {
                    const winnerKey = normalizeName(match.winnerId);
                    const loserKey = normalizeName(match.loserId);
                    const p1Key = normalizeName(match.player1);
                    const p2Key = normalizeName(match.player2);

                    let opponent = '';
                    let playerScore = null;
                    let opponentScore = null;
                    let isWinner = false;
                    let points = 0;

                    if (winnerKey || loserKey) {
                        isWinner = winnerKey === target;
                        opponent = isWinner ? (match.loserId || '—') : (match.winnerId || '—');
                        playerScore = isWinner ? match.winnerFrames : match.loserFrames;
                        opponentScore = isWinner ? match.loserFrames : match.winnerFrames;

                        if (isWinner) {
                            points = match.winnerPointsAwarded ?? 3;
                        } else {
                            if (match.loserPointsAwarded !== null && match.loserPointsAwarded !== undefined) {
                                points = match.loserPointsAwarded;
                            } else {
                                points = match.meritAwarded ? 1 : 0;
                            }
                        }
                    } else {
                        const isPlayer1 = p1Key === target;
                        opponent = isPlayer1 ? (match.player2 || '—') : (match.player1 || '—');
                        playerScore = isPlayer1 ? match.frames1 : match.frames2;
                        opponentScore = isPlayer1 ? match.frames2 : match.frames1;

                        const rawWinner = normalizeName(match.raw.winner);
                        isWinner = rawWinner ? rawWinner === target : Number(playerScore) > Number(opponentScore);
                        points = isWinner ? 3 : (match.meritAwarded ? 1 : 0);
                    }

                    return {
                        opponent,
                        playerScore: playerScore ?? '—',
                        opponentScore: opponentScore ?? '—',
                        points,
                        status: isWinner ? 'win' : (points === 1 ? 'merit' : 'loss'),
                        date: formatDate(match.timestamp),
                        timestamp: match.timestamp || 0
                    };
                })
                .sort((a, b) => b.timestamp - a.timestamp);
        }

        function openModal() {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
        }

        function closePlayerModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
        }

        function showPlayerHistory(playerName) {
            const rows = getPlayerHistoryRows(playerName);

            modalPlayerName.textContent = playerName.toUpperCase();
            modalSubtitle.textContent = rows.length === 1
                ? '1 resultado histórico'
                : `${rows.length} resultados históricos`;

            historyList.innerHTML = '';

            if (rows.length === 0) {
                historyList.innerHTML = '<div class="no-matches">Aún no ha jugado ninguna partida de liga.</div>';
                openModal();
                return;
            }

            rows.forEach(item => {
                const row = document.createElement('div');
                row.className = `history-row ${item.status}`;

                const opponent = document.createElement('span');
                opponent.className = 'opponent';
                opponent.textContent = item.opponent;

                const score = document.createElement('span');
                score.className = 'score';
                score.textContent = `${item.playerScore} - ${item.opponentScore}`;

                const pts = document.createElement('span');
                pts.className = 'pts';
                pts.textContent = item.points;

                const date = document.createElement('span');
                date.className = 'date';
                date.textContent = item.date;

                row.appendChild(opponent);
                row.appendChild(score);
                row.appendChild(pts);
                row.appendChild(date);

                historyList.appendChild(row);
            });

            openModal();
        }

        async function init() {
            try {
                [teamData, ligaMatches] = await Promise.all([
                    loadTeamData(),
                    loadMatches()
                ]);

                renderTeamButtons();
                renderTeam(currentTeamIndex);
                loadingScreen.classList.add('hidden');
            } catch (error) {
                console.error('Error loading team data:', error);
                loadingScreen.innerHTML = '<div class="loading-text" style="font-size: 1rem;">Error cargando datos</div>';
            }
        }

        closeModal.addEventListener('click', closePlayerModal);

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closePlayerModal();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('is-open')) {
                closePlayerModal();
            }
        });

        init();
    </script>
</body>
</html>
