<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" id="favicon">
    <title>Liga - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/navigation.css">
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-gold: #d4af37;
            --color-gold-light: #f4d03f;
            --color-white: #f5f5f5;
            --color-text-muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            color: var(--color-white);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            padding-top: calc(var(--nav-height) + 2rem);
        }

        .placeholder {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
        }

        .placeholder-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .placeholder h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--color-gold);
            margin-bottom: 1rem;
        }

        .placeholder p {
            color: var(--color-text-muted);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="placeholder">
            <div class="placeholder-icon">🚧</div>
            <h2>En construcción</h2>
            <p>La sección de Liga está siendo desarrollada. Prueba de concepto.</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- App Scripts -->
    <script src="../js/translations.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/badges.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/navigation-component.js"></script>

    <script>
        // Initialize Firebase and notifications
        try {
            if (typeof initFirebase === 'function') {
                initFirebase();
            }

            // Initialize Navigation
            new CatrinaNav({
                title: 'LIGA',
                subtitle: 'LA CATRINA',
                backLink: '../index.html',
                basePath: '../'
            });

            // Set up auth state change for notifications
            if (typeof onAuthStateChanged === 'function') {
                onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            await updateNotificationBell(user.uid);
                        } catch (error) {
                            console.error('Error updating notification bell:', error);
                        }
                    }
});
    </script>

<script>
// FAVICON ANIMADO: Bola de billar 8 rotando horizontalmente
const faviconCanvas = document.createElement('canvas');
faviconCanvas.width = 32;
faviconCanvas.height = 32;
const faviconCtx = faviconCanvas.getContext('2d');

function updateFavicon() {
    const time = Date.now() * 0.005;
    const rotation = Math.sin(time) * 0.15;

    faviconCtx.clearRect(0, 0, 32, 32);
    const cx = 16;
    const cy = 16;
    const radius = 14;

    const gradient = faviconCtx.createRadialGradient(
        cx - 3, cy - 3, 0,
        cx, cy, radius
    );
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.3, '#ffffff');
    gradient.addColorStop(0.5, '#0a0a0a');
    gradient.addColorStop(1, '#000000');

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.fillStyle = gradient;
    faviconCtx.fill();

    faviconCtx.save();
    faviconCtx.translate(cx, cy);
    faviconCtx.scale(1 + rotation * 0.5, 1);
    faviconCtx.translate(-cx, -cy);

    faviconCtx.fillStyle = '#ffffff';
    faviconCtx.font = 'bold 14px Arial';
    faviconCtx.textAlign = 'center';
    faviconCtx.textBaseline = 'middle';
    faviconCtx.fillText('8', cx, cy + 1);

    faviconCtx.restore();

    faviconCtx.beginPath();
    faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    faviconCtx.strokeStyle = '#d4af37';
    faviconCtx.lineWidth = 2;
    faviconCtx.stroke();

    const link = document.getElementById('favicon');
    if (link) {
        link.href = faviconCanvas.toDataURL('image/png');
    }

    requestAnimationFrame(updateFavicon);
}

updateFavicon();
</script>
</body>
</html>
