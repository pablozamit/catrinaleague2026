<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Catrina · Live</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #f3e7c2;
      min-height: 100vh;
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.86)),
        url('../material/imagen2.jpeg') center/cover no-repeat;
      filter: saturate(.9);
      z-index: -2;
    }
    .glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(212,175,55,.18), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(0,140,255,.12), transparent 30%);
      z-index: -1;
      pointer-events: none;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand h1 {
      color: #d4af37;
      letter-spacing: 4px;
      font-size: 2rem;
      text-shadow: 0 0 18px rgba(212,175,55,.35);
    }
    .brand p {
      color: #9e9e9e;
      font-size: .85rem;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .back {
      color: #f3e7c2;
      text-decoration: none;
      border: 1px solid rgba(212,175,55,.35);
      background: rgba(0,0,0,.35);
      padding: 10px 14px;
      border-radius: 999px;
      transition: .2s ease;
    }
    .back:hover {
      border-color: rgba(212,175,55,.7);
      background: rgba(212,175,55,.08);
    }
    .panel {
      width: min(1400px, 100%);
      margin: 0 auto;
      display: grid;
      place-items: center;
    }
    .player-shell {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(212,175,55,.28);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      position: relative;
    }
    #player, #state {
      width: 100%;
      height: 100%;
    }
    #state {
      display: grid;
      place-items: center;
      padding: 32px;
      text-align: center;
    }
    .card {
      max-width: 760px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(8,8,8,.66);
      border: 1px solid rgba(212,175,55,.25);
      backdrop-filter: blur(8px);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: .82rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
      border: 1px solid rgba(212,175,55,.25);
      color: #f3e7c2;
      background: rgba(212,175,55,.08);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff3b30;
      box-shadow: 0 0 14px rgba(255,59,48,.8);
    }
    .title {
      font-size: clamp(1.7rem, 2vw, 2.7rem);
      color: #d4af37;
      margin-bottom: 12px;
    }
    .text {
      color: #d8d8d8;
      line-height: 1.6;
      font-size: 1rem;
      margin-bottom: 18px;
    }
    .meta {
      color: #9f9f9f;
      font-size: .92rem;
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      color: #666;
      font-size: .78rem;
      letter-spacing: 1px;
      padding-bottom: 6px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
    @media (max-width: 768px) {
      .wrap { padding: 14px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .player-shell { border-radius: 18px; }
      .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>LA CATRINA</h1>
        <p>POOL LEAGUE · LIVE</p>
      </div>
      <a class="back" href="../">← Volver a la portada</a>
    </div>

    <main class="panel">
      <section class="player-shell">
        <div id="player"></div>
        <div id="state"></div>
      </section>
    </main>

    <div class="footer">La Catrina Pool League</div>
  </div>

  <script>
    const API_KEY = 'AIzaSyD94SnWIvHOLKc5cbZMSjYmma2BvQkjcng';
    const LIVE_VIDEO_ID = 'XEkddnNYxHs';

    const player = document.getElementById('player');
    const state = document.getElementById('state');

    function renderWaiting(data) {
      const title = data?.snippet?.title || 'Directo programado';
      const start = data?.liveStreamingDetails?.scheduledStartTime
        ? new Date(data.liveStreamingDetails.scheduledStartTime).toLocaleString('es-ES')
        : 'Hora no disponible';

      state.innerHTML = `
        <div class="card">
          <div class="badge"><span class="dot"></span> Programado</div>
          <h2 class="title">${title}</h2>
          <p class="text">El directo existe y está programado, pero todavía no ha arrancado en emisión pública.</p>
          <p class="meta">Inicio previsto: ${start}</p>
        </div>
      `;
      player.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${LIVE_VIDEO_ID}?autoplay=0&rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      `;
    }

    function renderLive(data) {
      const title = data?.snippet?.title || 'En directo';
      state.innerHTML = '';
      player.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${LIVE_VIDEO_ID}?autoplay=1&rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      `;
      document.title = `La Catrina · LIVE · ${title}`;
    }

    function renderOffline() {
      player.innerHTML = '';
      state.innerHTML = `
        <div class="card">
          <div class="badge">Ahora no hay directo</div>
          <h2 class="title">No está emitiendo ahora</h2>
          <p class="text">El enlace del evento existe, pero YouTube todavía no lo reporta como emisión activa ni programada accesible desde la API.</p>
          <p class="meta">Si acabas de crearlo o arrancarlo, espera un poco y recarga. YouTube a veces tarda en propagar el estado.</p>
        </div>
      `;
    }

    async function checkScheduledLive() {
      try {
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,status,liveStreamingDetails&id=${LIVE_VIDEO_ID}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.items || !data.items.length) {
          renderOffline();
          return;
        }

        const video = data.items[0];
        const hasLiveDetails = !!video.liveStreamingDetails;
        const hasActualStart = !!video.liveStreamingDetails?.actualStartTime;
        const hasActualEnd = !!video.liveStreamingDetails?.actualEndTime;
        const embeddable = video.status?.embeddable !== false;

        if (!embeddable) {
          state.innerHTML = `
            <div class="card">
              <div class="badge">Embed bloqueado</div>
              <h2 class="title">El vídeo no permite incrustación</h2>
              <p class="text">YouTube devuelve el evento, pero el vídeo no se puede embeber en una web externa.</p>
            </div>
          `;
          return;
        }

        if (hasLiveDetails && hasActualStart && !hasActualEnd) {
          renderLive(video);
          return;
        }

        if (hasLiveDetails) {
          renderWaiting(video);
          return;
        }

        renderOffline();
      } catch (err) {
        console.error(err);
        renderOffline();
      }
    }

    checkScheduledLive();
    setInterval(checkScheduledLive, 30000);
  </script>
</body>
</html>
