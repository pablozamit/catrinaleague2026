<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados | Catrina League 2026</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #374151;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 24px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent-2);
      color: #08111f;
      font-weight: 700;
      cursor: pointer;
      align-self: end;
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat {
      min-width: 150px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .stat .v {
      font-size: 1.35rem;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .match {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .score {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .teams {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .meta {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.8rem;
    }

    .winner { color: var(--accent); }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      margin-left: 12px;
      opacity: 0.9;
    }

    .nav a:hover { opacity: 1; }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .row {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav a {
        margin-left: 0;
        margin-right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Resultados</h1>
        <p class="sub">Histórico de partidos de la liga con filtros por equipo y jugador.</p>
      </div>
      <div class="nav">
        <a href="/">Inicio</a>
        <a href="/liga">Liga</a>
      </div>
    </div>

    <div class="toolbar panel">
      <div>
        <label for="teamFilter">Filtrar por equipo</label>
        <select id="teamFilter">
          <option value="">Todos los equipos</option>
        </select>
      </div>

      <div>
        <label for="playerFilter">Filtrar por jugador</label>
        <select id="playerFilter">
          <option value="">Todos los jugadores</option>
        </select>
      </div>

      <div>
        <label for="searchInput">Buscar texto</label>
        <input id="searchInput" type="text" placeholder="Ej. erfan o charles 1-3" />
      </div>

      <button id="resetBtn">Reset</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="k">Partidos</div>
        <div class="v" id="totalMatches">0</div>
      </div>
      <div class="stat">
        <div class="k">Ganadores únicos</div>
        <div class="v" id="uniqueWinners">0</div>
      </div>
      <div class="stat">
        <div class="k">Jugadores visibles</div>
        <div class="v" id="visiblePlayers">0</div>
      </div>
    </div>

    <div id="matchesList" class="list"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBgyARlrVo-J1qIhu49Nfvif_p7xVVFW5s",
      authDomain: "elopool-f1e62.firebaseapp.com",
      databaseURL: "https://elopool-f1e62-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "elopool-f1e62",
      storageBucket: "elopool-f1e62.firebasestorage.app",
      messagingSenderId: "125100775441",
      appId: "1:125100775441:web:b61f62a308af5c678db9b0"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const teamMap = {
      1: ['johnny', 'andres', 'mo', 'david', 'nica', 'danilo'],
      2: ['artur', 'sergio', 'alexf', 'jorge', 'alexb', 'sol'],
      3: ['amauris', 'sasa', 'angel', 'erfan', 'nino', 'damian'],
      4: ['jack', 'jonathan', 'connor', 'charles', 'lucas', 'favio'],
      5: ['fer', 'katee', 'enrique', 'mina', 'ruth', 'rauls'],
      6: ['pablo', 'joe', 'lucasc', 'joel', 'roman', 'manuela']
    };

    const teamNames = {
      1: 'BAH!',
      2: 'JAMPOOLEROS TEAM',
      3: 'LOS INTERNACIONALES',
      4: 'ITCHY ARMPITS',
      5: 'MACHACADORAS CON ACTITUD',
      6: 'MICROPLÁSTICOS EN LOS COJONES S.L.'
    };

    const playerToTeam = {};
    Object.entries(teamMap).forEach(([team, players]) => {
      players.forEach(player => { playerToTeam[player] = Number(team); });
    });

    const state = {
      matches: [],
      filtered: []
    };

    const teamFilter = document.getElementById('teamFilter');
    const playerFilter = document.getElementById('playerFilter');
    const searchInput = document.getElementById('searchInput');
    const resetBtn = document.getElementById('resetBtn');
    const matchesList = document.getElementById('matchesList');

    function formatDate(ts) {
      if (!ts) return 'Sin fecha';
      return new Date(ts * 1000).toLocaleString('es-ES', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function buildFilters(matches) {
      for (let i = 1; i <= 6; i++) {
        const option = document.createElement('option');
        option.value = String(i);
        option.textContent = teamNames[i] || `Equipo ${i}`;
        teamFilter.appendChild(option);
      }

      const players = new Set();
      matches.forEach(match => {
        if (match.winnerId) players.add(match.winnerId);
        if (match.loserId) players.add(match.loserId);
      });

      [...players].sort().forEach(player => {
        const option = document.createElement('option');
        option.value = player;
        const teamId = playerToTeam[player];
        const teamName = teamNames[teamId] || '-';
        option.textContent = `${player} (${teamName})`;
        playerFilter.appendChild(option);
      });
    }

    function applyFilters() {
      const team = teamFilter.value;
      const player = playerFilter.value;
      const search = searchInput.value.trim().toLowerCase();

      state.filtered = state.matches.filter(match => {
        const teamOk = !team || String(match.winnerTeam) === team || String(match.loserTeam) === team;
        const playerOk = !player || match.winnerId === player || match.loserId === player;
        const haystack = [
          match.winnerId,
          match.loserId,
          match.rawScore,
          match.rawMessage
        ].join(' ').toLowerCase();
        const searchOk = !search || haystack.includes(search);
        return teamOk && playerOk && searchOk;
      });

      renderStats();
      renderMatches();
    }

    function renderStats() {
      document.getElementById('totalMatches').textContent = state.filtered.length;

      const winners = new Set(state.filtered.map(m => m.winnerId).filter(Boolean));
      document.getElementById('uniqueWinners').textContent = winners.size;

      const players = new Set();
      state.filtered.forEach(m => {
        if (m.winnerId) players.add(m.winnerId);
        if (m.loserId) players.add(m.loserId);
      });
      document.getElementById('visiblePlayers').textContent = players.size;
    }

    function renderMatches() {
      if (!state.filtered.length) {
        matchesList.innerHTML = `<div class="empty">No hay partidos que coincidan con los filtros.</div>`;
        return;
      }

      matchesList.innerHTML = state.filtered.map(match => `
        <article class="match">
          <div class="row">
            <div>
              <div class="score">
                <span class="winner">${escapeHtml(match.winnerId || '—')}</span>
                ${match.winnerFrames ?? '-'} - ${match.loserFrames ?? '-'}
                <span>${escapeHtml(match.loserId || '—')}</span>
              </div>
              <div class="teams">
                ${teamNames[match.winnerTeam] || 'Equipo ' + (match.winnerTeam ?? '-')} vs ${teamNames[match.loserTeam] || 'Equipo ' + (match.loserTeam ?? '-')}
              </div>
            </div>
            <div class="tag">${formatDate(match.timestamp)}</div>
          </div>

          <div class="meta">
            <div class="tag">Ganador +${match.winnerPointsAwarded ?? 0} pts</div>
            <div class="tag">Perdedor +${match.loserPointsAwarded ?? 0} pts</div>
            <div class="tag">Chat ${match.chatId ?? '-'}</div>
            <div class="tag">Msg ${match.messageId ?? '-'}</div>
          </div>

          ${match.rawMessage ? `
            <div class="meta">
              <div class="tag">Mensaje: ${escapeHtml(match.rawMessage)}</div>
            </div>
          ` : ''}
        </article>
      `).join('');
    }

    async function loadMatches() {
      const snapshot = await database.ref('liga/matches').once('value');
      const data = snapshot.val() || {};

      state.matches = Object.entries(data).map(([id, value]) => ({
        id,
        ...value
      })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      buildFilters(state.matches);
      applyFilters();
    }

    teamFilter.addEventListener('change', applyFilters);
    playerFilter.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);

    resetBtn.addEventListener('click', () => {
      teamFilter.value = '';
      playerFilter.value = '';
      searchInput.value = '';
      applyFilters();
    });

    loadMatches().catch(err => {
      console.error(err);
      matchesList.innerHTML = `<div class="empty">Error cargando resultados.</div>`;
    });
  </script>
</body>
</html>
