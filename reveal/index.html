<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --black: #0a0a0a;
            --white: #f5f5f5;
            --felt: #1a4d2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            padding: 2rem 0 3rem;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: 6px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 3px;
            margin-top: 0.5rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            perspective: 1000px;
            cursor: pointer;
            min-height: 200px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 200px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--gold);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(212, 175, 55, 0.1);
        }

        .card-back {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--gold);
            transform: rotateY(180deg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(212, 175, 55, 0.1);
        }

        .card-number {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .card-symbol {
            font-size: 2rem;
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        .card-label {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .card-players {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
            padding: 0 1rem;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--white);
        }

        .player-row.unknown {
            color: var(--gold);
            font-style: italic;
            background: transparent;
            border: 1px dashed rgba(212, 175, 55, 0.3);
        }

        .card-hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 1rem;
        }

        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 1.8rem;
            }
            .card-number {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="./" class="back-link">← Volver</a>

    <div class="container">
        <div class="header">
            <h1 class="title">EQUIPOS</h1>
            <p class="subtitle">Liga 2026 · Toca las cartas para revelar</p>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <script>
        const teams = [
            { id: 1, known: ['johnny', 'mo'], unknown: 4 },
            { id: 2, known: ['artur', 'sergio'], unknown: 4 },
            { id: 3, known: ['amauris', 'sasa'], unknown: 4 },
            { id: 4, known: ['fer', 'katee'], unknown: 4 },
            { id: 5, known: ['jack', 'jonathan'], unknown: 4 },
            { id: 6, known: ['pablo', 'joe'], unknown: 4 }
        ];

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = teams.map(team => `
                <div class="card" onclick="flipCard(this, ${team.id})">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-number">${team.id}</div>
                            <div class="card-symbol">❓</div>
                        </div>
                        <div class="card-back">
                            <div class="card-label">EQUIPO ${team.id}</div>
                            <div class="card-players">
                                ${team.known.map(p => `
                                    <div class="player-row">${p.charAt(0).toUpperCase() + p.slice(1)}</div>
                                `).join('')}
                                ${Array(team.unknown).fill('<div class="player-row unknown">??????</div>').join('')}
                            </div>
                            <div class="card-hint">Toca para voltear</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function flipCard(card, teamId) {
            card.classList.toggle('flipped');
        }

        renderCards();
    </script>
</body>
</html>
