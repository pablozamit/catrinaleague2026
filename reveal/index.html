<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --black: #0a0a0a;
            --white: #f5f5f5;
            --felt: #1a4d2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        .header {
            text-align: center;
            padding: 3rem 0;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: 8px;
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            opacity: 0;
            transform: translateY(40px);
        }

        .team-card.revealed {
            animation: cardReveal 0.6s ease forwards;
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .team-number {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 1rem;
            text-align: center;
        }

        .player-row {
            display: flex;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--felt));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--black);
            margin-right: 1rem;
        }

        .player-name {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--white);
        }

        .reveal-btn {
            display: block;
            margin: 3rem auto 0;
            padding: 1rem 3rem;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--black);
            background: var(--gold);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .reveal-btn:hover {
            background: var(--gold-light);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .reveal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>
    <a href="./" class="back-link">← Volver</a>

    <div class="container">
        <div class="header">
            <h1 class="title">EQUIPOS</h1>
            <p class="subtitle">Liga 2026</p>
        </div>

        <div class="team-grid" id="teamGrid"></div>

        <button class="reveal-btn" id="revealBtn" onclick="revealTeams()">
            Revelar Equipos
        </button>
    </div>

    <script>
        const teams = [
            { id: 1, players: ['johnny', 'mo'] },
            { id: 2, players: ['artur', 'sergio'] },
            { id: 3, players: ['amauris', 'sasa'] },
            { id: 4, players: ['fer', 'katee'] },
            { id: 5, players: ['jack', 'jonathan'] },
            { id: 6, players: ['pablo', 'joe'] }
        ];

        function renderTeams() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = teams.map(team => `
                <div class="team-card" id="team-${team.id}">
                    <div class="team-number">EQUIPO ${team.id}</div>
                    ${team.players.map(player => `
                        <div class="player-row">
                            <div class="player-avatar">${player.charAt(0).toUpperCase()}</div>
                            <div class="player-name">${player.charAt(0).toUpperCase() + player.slice(1)}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function revealTeams() {
            const cards = document.querySelectorAll('.team-card');
            const btn = document.getElementById('revealBtn');
            
            btn.disabled = true;
            btn.textContent = '¡Revelado!';
            
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('revealed');
                }, index * 200);
            });
        }

        renderTeams();
    </script>
</body>
</html>
