<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - La Catrina Pool League</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --black: #0a0a0a;
            --white: #f5f5f5;
            --felt: #1a4d2e;
            --card-width: 180px;
            --card-height: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            padding: 80px 20px 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: 6px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 2px;
            margin-top: 0.5rem;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .naipe {
            width: var(--card-width);
            height: var(--card-height);
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .naipe.locked {
            cursor: not-allowed;
        }

        .naipe-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .naipe.revelado .naipe-inner {
            transform: rotateY(180deg);
        }

        .naipe-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .naipe-front {
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 2px solid #333;
        }

        .naipe-front.locked {
            border-color: #444;
            opacity: 0.7;
        }

        .naipe-front.locked::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.1) 10px,
                rgba(0,0,0,0.1) 20px
            );
            border-radius: 12px;
        }

        .naipe-corner {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--gold);
            align-self: flex-start;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .naipe-corner.bottom {
            align-self: flex-end;
            top: auto;
            bottom: 10px;
            left: auto;
            right: 10px;
            transform: rotate(180deg);
        }

        .naipe-center {
            font-size: 3rem;
            color: rgba(212, 175, 55, 0.4);
        }

        .naipe-suit {
            font-size: 2rem;
            color: rgba(212, 175, 55, 0.6);
        }

        .naipe-countdown {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ef4444;
            text-align: center;
            line-height: 1.2;
        }

        .naipe-countdown-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            color: #666;
            display: block;
            margin-top: 5px;
        }

        .naipe-back {
            background: linear-gradient(180deg, #1f1f1f 0%, #111111 100%);
            border: 2px solid var(--gold);
            transform: rotateY(180deg);
            justify-content: flex-start;
        }

        .naipe-back::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid var(--gold);
            border-radius: 6px;
            opacity: 0.3;
        }

        .naipe-header {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 8px;
            z-index: 1;
        }

        .naipe-players {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            z-index: 1;
        }

        .naipe-player {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: var(--white);
            text-align: center;
            padding: 6px 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .naipe-player.unknown {
            color: var(--gold);
            font-style: italic;
            background: transparent;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }

        .naipe-hint {
            font-size: 0.6rem;
            color: #666;
            margin-top: 8px;
            z-index: 1;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        @media (max-width: 600px) {
            :root {
                --card-width: 140px;
                --card-height: 200px;
            }
            .naipe-player {
                font-size: 0.6rem;
                padding: 4px 2px;
            }
            .naipe-center {
                font-size: 2rem;
            }
            .naipe-corner {
                font-size: 1rem;
            }
            .naipe-countdown {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <a href="./" class="back-link">← Volver</a>

    <div class="header">
        <h1 class="title">EQUIPOS</h1>
        <p class="subtitle">Liga 2026 · Se revelan poco a poco</p>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <script>
        const BASE_HOUR = 13;
        const teams = [
            { id: 1, known: ['johnny', 'mo'], unknown: 4 },
            { id: 2, known: ['artur', 'sergio'], unknown: 4 },
            { id: 3, known: ['amauris', 'sasa'], unknown: 4 },
            { id: 4, known: ['fer', 'katee'], unknown: 4 },
            { id: 5, known: ['jack', 'jonathan'], unknown: 4 },
            { id: 6, known: ['pablo', 'joe'], unknown: 4 }
        ];

        const suits = ['♠', '♥', '♦', '♣', '★', '◈'];

        function getSpainTime() {
            return new Date().toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
        }

        function getUnlockHour(teamId) {
            return BASE_HOUR + (teamId - 1);
        }

        function getTimeUntilUnlock(teamId) {
            const now = new Date();
            const madridTime = new Date(now.toLocaleString('es-ES', { timeZone: 'Europe/Madrid' }));
            
            const unlockDate = new Date(madridTime);
            unlockDate.setHours(getUnlockHour(teamId), 0, 0, 0);
            
            if (madridTime >= unlockDate) {
                return 0;
            }
            
            return Math.floor((unlockDate - madridTime) / 1000);
        }

        function formatCountdown(seconds) {
            if (seconds <= 0) return '00:00:00';
            
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function isUnlocked(teamId) {
            return getTimeUntilUnlock(teamId) <= 0;
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            
            container.innerHTML = teams.map(team => {
                const suit = suits[team.id - 1];
                const allPlayers = [...team.known, ...Array(team.unknown).fill('??????')];
                const unlocked = isUnlocked(team.id);
                const secondsUntil = getTimeUntilUnlock(team.id);
                const unlockHour = getUnlockHour(team.id);
                
                const frontClass = unlocked ? 'naipe-front' : 'naipe-front locked';
                
                let frontContent = '';
                if (unlocked) {
                    frontContent = `
                        <span class="naipe-corner">${team.id}</span>
                        <span class="naipe-center">${suit}</span>
                        <span class="naipe-corner bottom">${team.id}</span>
                    `;
                } else {
                    frontContent = `
                        <span class="naipe-corner">${team.id}</span>
                        <div class="naipe-countdown">
                            ${formatCountdown(secondsUntil)}
                            <span class="naipe-countdown-label">a las ${unlockHour}:00</span>
                        </div>
                        <span class="naipe-corner bottom">${team.id}</span>
                    `;
                }
                
                return `
                    <div class="naipe ${unlocked ? '' : 'locked'}" onclick="${unlocked ? 'revelar(this)' : ''}">
                        <div class="naipe-inner">
                            <div class="naipe-face ${frontClass}">
                                ${frontContent}
                            </div>
                            <div class="naipe-face naipe-back">
                                <div class="naipe-header">EQUIPO ${team.id}</div>
                                <div class="naipe-players">
                                    ${allPlayers.map(p => `
                                        <div class="naipe-player ${p === '??????' ? 'unknown' : ''}">${p}</div>
                                    `).join('')}
                                </div>
                                <div class="naipe-hint">${unlocked ? 'toca para voltear' : `se revela a las ${unlockHour}:00`}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function revelar(naipe) {
            if (naipe.classList.contains('locked')) return;
            naipe.classList.toggle('revelado');
        }

        renderCards();
        
        setInterval(() => {
            const lockedCards = document.querySelectorAll('.naipe.locked');
            if (lockedCards.length > 0) {
                renderCards();
            }
        }, 1000);
    </script>
</body>
</html>
