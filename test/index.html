<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Catrina - Pool League 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="icon" type="image/png" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        /* Canvas 3D */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* UI Layer */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: auto;
        }
        
        .header h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        .header p {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-top: 0.5rem;
        }
        
        /* Marcadores de troneras */
        .pocket-marker {
            position: absolute;
            width: 50px;
            height: 50px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
        }
        
        .pocket-marker.visible {
            opacity: 1;
        }
        
        .pocket-marker:hover {
            transform: translate(-50%, -50%) scale(1.3) !important;
        }
        
        .pocket-marker.dimmed {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .pocket-label {
            position: absolute;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            color: #d4af37;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s ease;
            top: 55px;
            pointer-events: none;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }
        
        .pocket-marker:hover .pocket-label {
            opacity: 1;
        }
        
        .pocket-marker span {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
        }
        
        /* Loading */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-size: 1.2rem;
            z-index: 1000;
            letter-spacing: 2px;
        }
        
        /* Instrucciones */
        .instructions {
            position: fixed;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #888;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .instructions.hidden {
            opacity: 0;
        }
        
        /* Footer */
        .version-footer {
            position: fixed;
            bottom: 0.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 1px;
            z-index: 100;
        }
        
        /* JOYSTICK */
        #joystick-zone {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 200;
            pointer-events: auto;
            display: none;
        }
        
        #joystick-zone.active {
            display: block;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(30, 30, 30, 0.8);
            border: 2px solid rgba(212, 175, 55, 0.5);
        }
        
        .joystick-handle {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.9);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            cursor: grab;
        }
        
        .joystick-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        /* Status indicator */
        #game-status {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 200;
            display: none;
            letter-spacing: 1px;
        }
        
        #game-status.active {
            display: block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="loading">Cargando escena...</div>
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div class="header">
            <h1>LA CATRINA</h1>
            <p>POOL LEAGUE & BILLIARDS</p>
        </div>
        
        <!-- Marcadores de troneras -->
        <div class="pocket-marker" id="marker-tl" data-target="../reglas/">
            <span>📋</span>
            <div class="pocket-label">Reglas</div>
        </div>
        
        <div class="pocket-marker" id="marker-tc" data-target="../elo/">
            <span>🏆</span>
            <div class="pocket-label">Ranking</div>
        </div>
        
        <div class="pocket-marker" id="marker-tr" data-target="../login.html">
            <span>🔐</span>
            <div class="pocket-label">Login</div>
        </div>
        
        <div class="pocket-marker" id="marker-bc" data-target="../liga/">
            <span>🎱</span>
            <div class="pocket-label">Liga</div>
        </div>
        
        <div class="pocket-marker" id="marker-br" data-target="../historial/">
            <span>📜</span>
            <div class="pocket-label">Historial</div>
        </div>
        
        <div class="instructions" id="instructions">
            Arrastra para rotar • Pulsa la radio para jugar
        </div>
        
        <div class="version-footer">
            La Catrina Pool League <span>v1.0.0</span>
        </div>
        
        <!-- Game Status -->
        <div id="game-status">MODO JUEGO ACTIVADO - Usa el joystick para mover al hombre</div>
        
        <!-- Joystick -->
        <div id="joystick-zone">
            <div class="joystick-base"></div>
            <div class="joystick-handle"></div>
        </div>
    </div>
    
    <script src="js/audio.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/table.js"></script>
    <script src="js/man.js"></script>
    <script src="js/radio.js"></script>
    <script src="js/joystick.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
