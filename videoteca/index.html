<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_videoteca">La Catrina - Videoteca</title>
    <link rel="icon" type="image/png" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #f3e7c2;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bar-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                        url('../material/imagen2.jpeg') center/cover;
            z-index: -1;
        }

        .header {
            text-align: center;
            padding: 3rem 2rem 1.5rem;
            width: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: relative;
        }

        .header h1 {
            font-family: 'Georgia', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .container {
            flex: 1;
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .main-player-section {
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .playlist-section {
            width: 100%;
        }

        .playlist-header {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-header h2 {
            font-size: 1.2rem;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom scrollbar */
        .video-grid::-webkit-scrollbar {
            width: 6px;
        }
        .video-grid::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .video-grid::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 3px;
        }

        .video-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            background: rgba(30, 30, 30, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .video-card.active {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .video-info {
            padding: 10px;
        }

        .video-title {
            font-size: 0.85rem;
            color: #f3e7c2;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .active-label {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #d4af37;
            color: #000;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
        }

        .video-card.active .active-label {
            display: block;
        }

        .back-nav {
            margin: 2rem 0;
            text-align: center;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 24px;
            border-radius: 30px;
            display: inline-block;
        }

        .back-link:hover {
            color: #d4af37;
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.05);
        }

        .footer {
            padding: 2rem;
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-align: center;
        }

        #langSelectorContainer {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .loading-text {
            text-align: center;
            padding: 3rem;
            color: #888;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bar-bg"></div>

    <div class="header">
        <div id="langSelectorContainer"></div>
        <h1 data-i18n="nav_videoteca">VIDEOTECA</h1>
        <p style="color: #888; letter-spacing: 4px; margin-top: 0.5rem;" data-i18n="videoteca_subtitle">PARTIDOS HISTÓRICOS</p>
    </div>

    <div class="container">
        <section class="main-player-section">
            <div class="video-wrapper">
                <iframe
                    id="mainPlayer"
                    src="https://www.youtube.com/embed/videoseries?list=PLRc6SHie1llWuFXfM8EjW5mFLgCjLyYls&autoplay=1"
                    title="La Catrina Videoteca"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="playlist-section">
            <div class="playlist-header">
                <h2 data-i18n="videoteca_list_title">Lista de Partidos</h2>
                <span id="videoCount" style="font-size: 0.8rem; color: #888;">-- videos</span>
            </div>
            <div id="videoGrid" class="video-grid">
                <div class="loading-text" data-i18n="videoteca_loading">Cargando videoteca...</div>
            </div>
        </section>

        <div class="back-nav">
            <a href="../" class="back-link" data-i18n="videoteca_back">Volver al Salón</a>
        </div>
    </div>

    <div class="footer">
        La Catrina Pool League <span>v1.1.0</span>
    </div>

    <script src="../js/translations.js"></script>
    <script>
        const API_KEY = 'AIzaSyD94SnWIvHOLKc5cbZMSjYmma2BvQkjcng';
        const PLAYLIST_ID = 'PLRc6SHie1llWuFXfM8EjW5mFLgCjLyYls';
        const mainPlayer = document.getElementById('mainPlayer');
        const videoGrid = document.getElementById('videoGrid');
        const videoCount = document.getElementById('videoCount');

        if (typeof createLanguageSelector === 'function') {
            document.getElementById('langSelectorContainer').innerHTML = createLanguageSelector();
        }

        async function fetchPlaylist() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}`);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    renderGallery(data.items);
                    videoCount.innerText = `${data.items.length} videos`;
                } else {
                    videoGrid.innerHTML = `<div class="loading-text" data-i18n="videoteca_empty">${t('videoteca_empty')}</div>`;
                }
            } catch (error) {
                console.error('Error fetching playlist:', error);
                videoGrid.innerHTML = `<div class="loading-text" data-i18n="videoteca_error">${t('videoteca_error')}</div>`;
            }
        }

        function renderGallery(videos) {
            videoGrid.innerHTML = '';
            videos.forEach((video, index) => {
                const snippet = video.snippet;
                const videoId = snippet.resourceId.videoId;
                const title = snippet.title;
                const thumbnail = snippet.thumbnails.medium?.url || snippet.thumbnails.default?.url;

                const card = document.createElement('div');
                card.className = 'video-card' + (index === 0 ? ' active' : '');
                card.innerHTML = `
                    <div class="thumbnail-container" style="background-image: url('${thumbnail}')">
                        <div class="play-overlay">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="#d4af37" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 5V19L19 12L8 5Z" />
                            </svg>
                        </div>
                        <div class="active-label" data-i18n="videoteca_playing">${t('videoteca_playing')}</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                    </div>
                `;

                card.onclick = () => {
                    // Update player
                    mainPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

                    // Update active state
                    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // Scroll to top on mobile
                    if (window.innerWidth < 768) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };

                videoGrid.appendChild(card);
            });
        }

        fetchPlaylist();

        // Favicon animation
        const faviconCanvas = document.createElement('canvas');
        faviconCanvas.width = 32;
        faviconCanvas.height = 32;
        const faviconCtx = faviconCanvas.getContext('2d');

        function updateFavicon() {
            const time = Date.now() * 0.005;
            const rotation = Math.sin(time) * 0.15;
            faviconCtx.clearRect(0, 0, 32, 32);
            const cx = 16, cy = 16, radius = 14;
            const gradient = faviconCtx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.3, '#ffffff');
            gradient.addColorStop(0.5, '#0a0a0a');
            gradient.addColorStop(1, '#000000');
            faviconCtx.beginPath();
            faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            faviconCtx.fillStyle = gradient;
            faviconCtx.fill();
            faviconCtx.save();
            faviconCtx.translate(cx, cy);
            faviconCtx.scale(1 + rotation * 0.5, 1);
            faviconCtx.translate(-cx, -cy);
            faviconCtx.fillStyle = '#ffffff';
            faviconCtx.font = 'bold 14px Arial';
            faviconCtx.textAlign = 'center';
            faviconCtx.textBaseline = 'middle';
            faviconCtx.fillText('8', cx, cy + 1);
            faviconCtx.restore();
            faviconCtx.beginPath();
            faviconCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            faviconCtx.strokeStyle = '#d4af37';
            faviconCtx.lineWidth = 2;
            faviconCtx.stroke();
            const link = document.getElementById('favicon');
            if (link) {
                link.href = faviconCanvas.toDataURL('image/png');
            }
            requestAnimationFrame(updateFavicon);
        }
        updateFavicon();
    </script>
</body>
</html>
